<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NOVARA — prototype</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/maplibre-contour@0.1.0/dist/index.min.js"></script>
  <style>
    :root{ --bg:#0c100e; --panel:rgba(12,16,14,.72); --ink:#f2f5f3; --muted:#93a39b;
           --hair:rgba(255,255,255,.10); --warm:#ff6a2c; --cool:#34e0c4; }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; background:var(--bg); font-family:-apple-system,system-ui,"Segoe UI",sans-serif; color:var(--ink); }
    #map{ position:absolute; inset:0; }

    .search{ position:fixed; top:14px; left:14px; right:74px; z-index:6; }
    .search .box{ display:flex; align-items:center; gap:10px; padding:11px 14px;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.35); }
    .search .logo{ font-weight:800; letter-spacing:.16em; font-size:13px; }
    .search input{ flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-size:15px; }
    .search input::placeholder{ color:var(--muted); }
    #savedCount{ color:var(--cool); font-size:12px; font-weight:700; }
    .results{ margin-top:8px; background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:14px; overflow:hidden; display:none; }
    .results.show{ display:block; }
    .results .row{ padding:11px 14px; border-bottom:1px solid var(--hair); cursor:pointer; }
    .results .row:last-child{ border-bottom:0; }
    .results .t{ font-size:14px; } .results .s{ font-size:12px; color:var(--muted); }

    /* brújula siempre presente */
    .compass{ position:fixed; top:12px; right:14px; z-index:6; width:48px; height:48px; border-radius:50%;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); cursor:pointer;
      display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,0,0,.4); }
    .compass .rose{ width:100%; height:100%; position:relative; transition:transform .12s linear; }
    .compass .rose::before{ content:""; position:absolute; top:7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:15px solid var(--warm); }
    .compass .rose::after{ content:""; position:absolute; bottom:7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-top:15px solid #5b6b63; }
    .compass .n{ position:absolute; top:-2px; left:50%; transform:translateX(-50%); color:var(--warm); font-weight:800; font-size:10px; }

    .navbanner{ position:fixed; top:14px; left:14px; right:14px; z-index:8; background:rgba(12,16,14,.94); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:16px; padding:14px 16px; box-shadow:0 6px 22px rgba(0,0,0,.55); }
    .navbanner .ni{ font-size:17px; font-weight:700; cursor:pointer; }
    .navbanner .nmeta{ display:flex; justify-content:space-between; color:var(--muted); font-size:13px; margin-top:6px; }
    .navbanner .nmeta .exit{ color:#ff8a8a; cursor:pointer; font-weight:700; }
    .navbanner .steps{ display:none; margin-top:10px; max-height:42vh; overflow:auto; border-top:1px solid var(--hair); padding-top:8px; }
    .navbanner .steps.show{ display:block; }
    .navbanner .step{ padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    .navbanner .step .muted{ color:var(--muted); }

    .recpill{ position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:8; background:rgba(255,106,44,.94); color:#1a0d06; font-weight:800; font-size:13px; padding:9px 16px; border-radius:20px; box-shadow:0 4px 16px rgba(0,0,0,.4); }

    /* selector de capas (un botón → panel), en vez de 5 chips sueltos */
    .layerpicker{ position:fixed; right:14px; bottom:300px; z-index:6; width:230px; display:none;
      background:var(--panel); backdrop-filter:blur(14px); border:1px solid var(--hair); border-radius:16px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .layerpicker.open{ display:block; }
    .lp-title{ color:var(--muted); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin:2px 2px 8px; }
    .lp-types{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .lp{ padding:11px 8px; border-radius:11px; border:1px solid var(--hair); background:rgba(255,255,255,.05); color:var(--ink); font-size:13px; font-weight:600; cursor:pointer; text-align:center; width:100%; }
    .lp.on{ color:var(--cool); border-color:rgba(52,224,196,.55); background:rgba(52,224,196,.16); }
    .lp.overlay{ text-align:left; }
    .lp.overlay.on{ color:var(--warm); border-color:rgba(255,106,44,.55); background:rgba(255,106,44,.16); }

    .fabs{ position:fixed; right:14px; bottom:120px; z-index:5; display:flex; flex-direction:column; gap:12px; }
    .fab{ width:52px; height:52px; border-radius:50%; border:1px solid var(--hair); background:rgba(18,23,20,.9); backdrop-filter:blur(12px); color:var(--ink); font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.4); }
    .fab.accent{ background:var(--warm); color:#1a0d06; border-color:transparent; }

    .sheet{ position:fixed; left:0; right:0; bottom:0; z-index:7; display:none; background:var(--bg); border-top-left-radius:20px; border-top-right-radius:20px; border-top:1px solid var(--hair); box-shadow:0 -8px 30px rgba(0,0,0,.5); padding:8px 18px 22px; max-height:85vh; overflow-y:auto; }
    .sheet.open{ display:block; }
    .sheet .grab{ width:42px; height:5px; border-radius:3px; background:#3a463f; margin:6px auto 12px; }
    .sheet h2{ margin:0; font-size:19px; }
    .sheet .sub{ color:var(--muted); font-size:13px; margin-top:3px; }
    .sheet .meta{ color:var(--muted); font-size:12px; margin-top:8px; }
    .sheet .routebox{ margin-top:14px; padding:12px 14px; border-radius:12px; border:1px solid rgba(52,224,196,.4); background:rgba(52,224,196,.10); font-size:14px; }
    .routebox .muted{ color:var(--muted); }
    .routebox .modes{ display:flex; align-items:center; gap:8px; }
    .routebox .mode{ padding:6px 10px; border-radius:9px; border:1px solid var(--hair); cursor:pointer; font-size:16px; }
    .routebox .mode.on{ border-color:rgba(52,224,196,.6); background:rgba(52,224,196,.16); }
    .routebox .startnav{ margin-top:12px; width:100%; padding:12px; border-radius:12px; border:0; background:var(--cool); color:#06201b; font-weight:800; font-size:15px; cursor:pointer; }
    .sheet .acts{ display:flex; gap:10px; margin-top:16px; }
    .sheet .acts button{ flex:1; padding:13px 8px; border-radius:14px; border:1px solid var(--hair); background:rgba(255,255,255,.06); color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }
    .sheet .acts button.primary{ background:var(--warm); color:#1a0d06; border-color:transparent; }
    .sheet .close{ position:absolute; top:14px; right:16px; color:var(--muted); cursor:pointer; font-size:18px; }

    /* toast de error: se evapora a 2s, no tapa nada */
    #err{ position:fixed; left:50%; bottom:86px; transform:translateX(-50%); z-index:9; background:rgba(150,40,40,.92); color:#ffe3e3; font:12px/1.4 sans-serif; padding:9px 16px; border-radius:14px; display:none; max-width:84%; text-align:center; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.4); }

    /* atribución: obligatoria por licencia, pero colapsada a un (i) discreto (no texto fijo) */
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) .maplibregl-ctrl-attrib-inner{ display:none !important; }
    .maplibregl-ctrl-attrib{ background:rgba(12,16,14,.45) !important; border-radius:11px !important; font-size:10px; }
    .maplibregl-ctrl-attrib a, .maplibregl-ctrl-attrib{ color:#7d8a83 !important; }
    .maplibregl-ctrl-attrib-button{ background-color:rgba(12,16,14,.55) !important; }

    /* onboarding fricción-cero: activar ubicación de un toque */
    .onboard{ position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); display:none; align-items:flex-end; }
    .onboard.show{ display:flex; }
    .ob-card{ background:var(--bg); border-top-left-radius:22px; border-top-right-radius:22px; border-top:1px solid var(--hair); padding:26px 22px 30px; width:100%; text-align:center; box-shadow:0 -10px 40px rgba(0,0,0,.6); }
    .ob-emoji{ font-size:40px; } .ob-card h3{ margin:10px 0 6px; font-size:21px; } .ob-card p{ color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 12px; }
    .ob-card button{ width:100%; padding:14px; border-radius:14px; border:0; font-size:15px; font-weight:800; cursor:pointer; margin-top:10px; background:var(--cool); color:#06201b; }
    .ob-card button.ghost{ background:transparent; color:var(--muted); font-weight:600; }

    /* === Acciones: SOS, off-grid, descarga, planificar, chincheta, POI === */
    .fab.sos{ position:fixed; left:14px; bottom:120px; z-index:6; width:56px; height:56px; background:#e23b34; color:#fff; font-weight:800; font-size:15px; letter-spacing:.03em; border-color:transparent; box-shadow:0 6px 20px rgba(226,59,52,.5); }
    .modehint{ position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:8; background:rgba(12,16,14,.94); border:1px solid var(--hair); color:var(--ink); font-size:13px; font-weight:600; padding:9px 16px; border-radius:20px; box-shadow:0 4px 16px rgba(0,0,0,.45); display:none; max-width:88%; text-align:center; }
    .planbar{ position:fixed; left:14px; right:14px; bottom:14px; z-index:8; display:none; gap:8px; background:rgba(12,16,14,.95); border:1px solid var(--hair); border-radius:16px; padding:11px 12px; box-shadow:0 6px 22px rgba(0,0,0,.5); align-items:center; }
    .planbar.show{ display:flex; }
    .planbar .pb-info{ flex:1; font-size:13px; line-height:1.3; } .planbar .pb-info b{ font-size:15px; } .planbar .muted{ color:var(--muted); }
    .planbar button{ padding:10px 12px; border-radius:11px; border:1px solid var(--hair); background:rgba(255,255,255,.06); color:var(--ink); font-weight:700; font-size:14px; cursor:pointer; }
    .planbar button.go{ background:var(--cool); color:#06201b; border-color:transparent; }

    .modal{ position:fixed; inset:0; z-index:21; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); display:none; align-items:flex-end; }
    .modal.show{ display:flex; }
    .modal-card{ position:relative; background:var(--bg); border-top-left-radius:22px; border-top-right-radius:22px; border-top:1px solid var(--hair); padding:24px 22px 28px; width:100%; box-shadow:0 -10px 40px rgba(0,0,0,.6); max-height:88vh; overflow-y:auto; }
    .modal .close{ position:absolute; top:14px; right:16px; color:var(--muted); cursor:pointer; font-size:18px; }
    .m-emoji{ font-size:38px; text-align:center; }
    .modal-card h2{ margin:8px 0 4px; font-size:20px; text-align:center; }
    .m-sub{ color:var(--muted); font-size:13.5px; line-height:1.5; text-align:center; margin:0 0 14px; }
    .m-coords{ text-align:center; font-size:14.5px; font-weight:700; color:var(--cool); padding:10px; border:1px solid var(--hair); border-radius:12px; margin-bottom:14px; line-height:1.4; }
    .m-primary{ width:100%; padding:14px; border-radius:14px; border:0; font-size:15px; font-weight:800; cursor:pointer; background:var(--cool); color:#06201b; }
    .m-primary.danger{ background:#e23b34; color:#fff; }
    .m-primary:disabled{ opacity:.7; }
    .m-ghost{ width:100%; padding:12px; border-radius:14px; border:1px solid var(--hair); background:transparent; color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
    .modal-card textarea{ width:100%; height:84px; resize:none; background:rgba(255,255,255,.05); border:1px solid var(--hair); border-radius:12px; color:var(--ink); font-size:14px; padding:11px; font-family:inherit; margin-bottom:10px; }
    .m-input{ width:100%; background:rgba(255,255,255,.05); border:1px solid var(--hair); border-radius:12px; color:var(--ink); font-size:14px; padding:12px; font-family:inherit; margin-bottom:10px; outline:none; }
    .m-input:focus{ border-color:rgba(52,224,196,.55); }
    .m-path{ text-align:center; font-size:17px; letter-spacing:.04em; color:var(--muted); margin:2px 0 14px; }
    .m-prog{ height:10px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:14px; }
    .m-prog>i{ display:block; height:100%; width:0; background:var(--cool); transition:width .25s; }
    .m-cats{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .m-cat{ padding:14px 10px; border-radius:13px; border:1px solid var(--hair); background:rgba(255,255,255,.05); color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; text-align:center; }
    .m-list .pr{ padding:11px 4px; border-bottom:1px solid var(--hair); font-size:14px; cursor:pointer; } .m-list .pr:last-child{ border-bottom:0; }
    .m-list .pr .d{ color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="onboard" id="onboard">
    <div class="ob-card">
      <div class="ob-emoji">🧭</div>
      <h3>NOVARA necesita tu ubicación</h3>
      <p>Para tu posición, el rumbo y calcular rutas <b>desde ti</b>. Sin cuenta, sin rastreo, gratis.</p>
      <button id="obAllow">Permitir ubicación</button>
      <button class="ghost" id="obSkip">Ahora no</button>
    </div>
  </div>

  <div class="search" id="searchBar">
    <div class="box"><span class="logo">NOVARA</span>
      <input id="q" type="text" placeholder="Buscar lugar, dirección…" autocomplete="off" />
      <span id="savedCount"></span></div>
    <div class="results" id="results"></div>
  </div>

  <div class="compass" id="compass" title="Brújula · toca para mirar al norte">
    <div class="rose" id="compassRose"><span class="n">N</span></div>
  </div>

  <div class="navbanner" id="navBanner" style="display:none">
    <div class="ni" id="navInstr" onclick="document.getElementById('navSteps').classList.toggle('show')">—</div>
    <div class="nmeta"><span id="navEta"></span><span class="exit" id="navExit">✕ Salir</span></div>
    <div class="steps" id="navSteps"></div>
  </div>

  <div class="recpill" id="recPill" style="display:none"></div>

  <div class="layerpicker" id="layerPicker">
    <div class="lp-title">Tipo de mapa</div>
    <div class="lp-types">
      <button class="lp on" data-flavor="aventura">Aventura</button>
      <button class="lp" data-flavor="mapa">Mapa</button>
      <button class="lp" data-flavor="satelite">Satélite</button>
      <button class="lp" data-flavor="noche">Noche</button>
    </div>
    <div class="lp-title">Relieve</div>
    <button class="lp overlay on" id="curvasChip">⛰️ Curvas de nivel</button>
    <button class="lp overlay on" id="peaksChip">🗻 Cumbres (nombre + altitud)</button>
    <button class="lp overlay" id="d3Chip">🏔️ Relieve 3D</button>
    <div class="lp-title">Capas</div>
    <button class="lp overlay" id="sendasChip">🥾 Sendas (rutas)</button>
  </div>

  <div class="fabs">
    <div class="fab" id="actionsBtn" title="Acciones">✚</div>
    <div class="fab" id="layersBtn" title="Capas">▦</div>
    <div class="fab" id="locBtn" title="Mi ubicación">◎</div>
    <div class="fab accent" id="trackBtn" title="Grabar track">▶</div>
  </div>

  <div class="fab sos" id="sosBtn" title="SOS · emergencia">SOS</div>

  <div class="layerpicker" id="actionsPanel">
    <div class="lp-title">Acciones</div>
    <button class="lp overlay" id="aDiag">🔎 Analizar mi móvil</button>
    <button class="lp overlay" id="aPlan">🧭 Planificar ruta</button>
    <button class="lp overlay" id="aPin">📍 Soltar chincheta</button>
    <button class="lp overlay" id="aPoi">⭐ Puntos de interés</button>
    <button class="lp overlay" id="aDownload">⬇️ Descargar esta zona</button>
    <button class="lp overlay" id="aMesh">📡 Mensajes off-grid</button>
  </div>

  <div class="modehint" id="modeHint"></div>

  <div class="planbar" id="planbar">
    <div class="pb-info" id="pbInfo"></div>
    <button id="pbClear" title="Reiniciar puntos">↺</button>
    <button id="pbCancel" title="Cancelar">✕</button>
    <button class="go" id="pbGo">Navegar</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card"><span class="close" id="modalClose">✕</span><div id="modalBody"></div></div>
  </div>

  <div class="sheet" id="sheet">
    <span class="close" id="sheetClose">✕</span><div class="grab"></div>
    <h2 id="sheetTitle">—</h2><div class="sub" id="sheetSub"></div><div class="meta" id="sheetMeta"></div>
    <div class="routebox" id="routeBox" style="display:none"></div>
    <div class="acts">
      <button class="primary" id="actGo">Cómo llegar</button>
      <button id="actSave">Guardar</button>
      <button id="actShare">Compartir</button>
    </div>
  </div>

  <div id="err"></div>

  <script>
    const $=id=>document.getElementById(id);
    let errTimer=null;
    const showErr=m=>{ const e=$("err"); e.textContent=m; e.style.display="block"; clearTimeout(errTimer); errTimer=setTimeout(()=>{ e.style.display="none"; },2000); };
    window.addEventListener("error", ev=>{ const m=ev.message||String(ev.error); if(m.indexOf("Script error")>=0) return; showErr(m); });

    // Service Worker: motor de mapas offline reales (cachea teselas vistas/descargadas).
    if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

    // ===== Fuentes de mapa: TODO libre (OSM / Sentinel-2 ESA / OpenTopoMap) =====
    const OFM_FONTS="https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf";
    const SAT=["https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2020_3857/default/g/{z}/{y}/{x}.jpg"];
    // Ortofoto alta resolución de España (IGN PNOA, gratis, ~0,5 m) — encima del Sentinel-2 mundial.
    const PNOA=["https://www.ign.es/wmts/pnoa-ma?Service=WMTS&Request=GetTile&Version=1.0.0&Layer=OI.OrthoimageCoverage&Style=default&Format=image/jpeg&TileMatrixSet=GoogleMapsCompatible&TileMatrix={z}&TileCol={x}&TileRow={y}"];
    // PNOA es España y en JPEG (sin transparencia): fuera de España devuelve teselas EN BLANCO que
    // taparían el satélite mundial. Acotamos su carga a España (penín.+Baleares+Canarias) → fuera,
    // solo Sentinel-2. bounds = [oeste, sur, este, norte].
    const SPAIN_BOUNDS=[-18.3, 27.5, 4.4, 44.0];
    const SENDAS=["https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png"];
    // Aventura = OpenFreeMap "liberty" (vector, con relieve, rápido). OpenTopoMap (raster lento/feo) RETIRADO.
    const STYLES={ aventura:"https://tiles.openfreemap.org/styles/liberty", mapa:"https://tiles.openfreemap.org/styles/bright", noche:"https://tiles.openfreemap.org/styles/dark" };
    // URL TileJSON del planeta vector (OpenFreeMap) — fuente de las cumbres también en satélite.
    const OMT_PLANET="https://tiles.openfreemap.org/planet";
    function satelliteStyle(){
      // Satélite = raster ligero (Sentinel-2 mundial + PNOA alta-res en España) + una fuente
      // vectorial dedicada "omt" SOLO para los nombres de cumbres (como hace PeakVisor, gratis).
      // Las cumbres se añaden luego en ensurePeaks(); aquí solo declaramos la fuente y el orden.
      return { version:8, glyphs:OFM_FONTS,
        sources:{
          // maxzoom cap = clave: Sentinel-2 es 10 m/píxel (máx útil ~z14); sin cap, MapLibre pide
          // tiles inexistentes a z15+ → 404 → mapa NEGRO. Con maxzoom hace overzoom (estira el
          // último tile, nunca negro). PNOA (España, 0,5 m) sí llega nítido a z19.
          sat:{ type:"raster", tiles:SAT, tileSize:256, maxzoom:14, attribution:"Sentinel-2 cloudless · EOX (CC-BY) · ESA" },
          pnoa:{ type:"raster", tiles:PNOA, tileSize:256, maxzoom:19, bounds:SPAIN_BOUNDS, attribution:"PNOA © Instituto Geográfico Nacional de España" },
          omt:{ type:"vector", url:OMT_PLANET }
        },
        layers:[
          { id:"bg", type:"background", paint:{ "background-color":"#0c100e" } },
          { id:"sat", type:"raster", source:"sat" },
          { id:"pnoa", type:"raster", source:"pnoa", minzoom:7 }
        ] };
    }
    function buildStyle(f){ if(f==="satelite") return satelliteStyle(); return STYLES[f]||STYLES.aventura; }

    const map=new maplibregl.Map({ container:"map", style:buildStyle("aventura"), center:[-3.70,40.42], zoom:5.4, maxPitch:80, attributionControl:false });
    // Atribución legal obligatoria (OSM/OpenFreeMap) pero colapsada a un (i) discreto, no un texto fijo.
    map.addControl(new maplibregl.AttributionControl({ compact:true }), "bottom-right");
    const collapseAttrib=()=>{ const at=document.querySelector(".maplibregl-ctrl-attrib"); if(at) at.classList.remove("maplibregl-compact-show"); };
    setTimeout(collapseAttrib,400); setTimeout(collapseAttrib,1500);
    map.on("error", e=>showErr("mapa: "+(e.error&&e.error.message)));

    // ===== Relieve desde DEM gratis (terrarium): curvas de nivel + hillshade + 3D =====
    const TERRARIUM="https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png";
    const demSource=new mlcontour.DemSource({ url:TERRARIUM, encoding:"terrarium", maxzoom:13, worker:true });
    demSource.setupMaplibre(maplibregl);
    let showContours=true, is3D=false, showPeaks=true, flavorBefore3D=null;
    // Malla del terreno: terrarium DIRECTO (MapLibre lo decodifica nativo, sin pasar por el worker
    // de mlcontour) → mucho más fluido al mover el mapa en 3D. maxzoom 13 = ligero y rápido.
    function ensureDem(){ if(!map.getSource("dem")) map.addSource("dem",{ type:"raster-dem", encoding:"terrarium", tiles:[TERRARIUM], maxzoom:13, tileSize:256 }); }
    function firstSymbol(){ const s=map.getStyle().layers.find(l=>l.type==="symbol"); return s?s.id:undefined; }
    function ensureHillshade(){ if(currentFlavor==="satelite") return; ensureDem(); if(!map.getLayer("hillshade")) map.addLayer({ id:"hillshade", type:"hillshade", source:"dem", minzoom:6, paint:{ "hillshade-exaggeration":0.35 } }, firstSymbol()); }
    // Satélite drapeado para 3D: capas raster (Sentinel-2 + PNOA España) por DEBAJO de los símbolos,
    // así el relieve se ve con imagen real y los nombres de cumbres quedan encima. Solo en 3D y si la
    // capa base no es ya satélite. IDs propios (sat3d) para no chocar con el estilo satélite.
    function ensureSatOverlay(){ const want = is3D && currentFlavor!=="satelite";
      if(want){
        if(!map.getSource("sat3d")) map.addSource("sat3d",{ type:"raster", tiles:SAT, tileSize:256, maxzoom:14, attribution:"Sentinel-2 cloudless · EOX (CC-BY) · ESA" });
        if(!map.getSource("pnoa3d")) map.addSource("pnoa3d",{ type:"raster", tiles:PNOA, tileSize:256, maxzoom:19, bounds:SPAIN_BOUNDS, attribution:"PNOA © Instituto Geográfico Nacional de España" });
        const before=firstSymbol();
        if(!map.getLayer("sat3d-l")) map.addLayer({ id:"sat3d-l", type:"raster", source:"sat3d" }, before);
        if(!map.getLayer("pnoa3d-l")) map.addLayer({ id:"pnoa3d-l", type:"raster", source:"pnoa3d", minzoom:7 }, before);
      } else {
        ["sat3d-l","pnoa3d-l"].forEach(id=>{ if(map.getLayer(id)) map.removeLayer(id); });
        ["sat3d","pnoa3d"].forEach(id=>{ if(map.getSource(id)){ try{ map.removeSource(id); }catch(e){} } });
      } }
    function ensureContours(){ if(!showContours || currentFlavor==="satelite" || is3D){ ["contour-labels","contour-lines"].forEach(id=>{ if(map.getLayer(id)) map.removeLayer(id); }); return; }
      if(!map.getSource("contours")) map.addSource("contours",{ type:"vector", maxzoom:15, tiles:[ demSource.contourProtocolUrl({ multiplier:1, thresholds:{ 10:[500,2000], 11:[200,1000], 12:[100,500], 13:[100,500], 14:[50,250], 15:[20,100] }, elevationKey:"ele", levelKey:"level", contourLayer:"contours" }) ] });
      const before=firstSymbol();
      if(!map.getLayer("contour-lines")) map.addLayer({ id:"contour-lines", type:"line", source:"contours", "source-layer":"contours", minzoom:10, paint:{ "line-color":"rgba(150,110,70,.55)", "line-width":["match",["get","level"],1,1.4,0.6] } }, before);
      if(!map.getLayer("contour-labels")) map.addLayer({ id:"contour-labels", type:"symbol", source:"contours", "source-layer":"contours", minzoom:12, filter:[">",["get","level"],0], layout:{ "symbol-placement":"line", "text-field":["concat",["to-string",["get","ele"]]," m"], "text-font":["Noto Sans Regular"], "text-size":10, "text-max-angle":25 }, paint:{ "text-color":"#c79a64", "text-halo-color":"#0c100e", "text-halo-width":1 } }); }
    function applyTerrain(animate){ if(is3D){ ensureDem(); map.setTerrain({ source:"dem", exaggeration:1.4 }); try{ if(map.setSky) map.setSky({ "sky-color":"#a3c6e6", "horizon-color":"#d6e4f0", "fog-color":"#e6eef5", "fog-ground-blend":0.5 }); }catch(e){} if(animate && map.getPitch()<30) map.easeTo({ pitch:62 }); } else { try{ map.setTerrain(null); }catch(e){} try{ if(map.setSky) map.setSky({ "sky-color":"#0c100e","horizon-color":"#0c100e","fog-color":"#0c100e","fog-ground-blend":0,"horizon-fog-blend":0,"sky-horizon-blend":0 }); }catch(e){} }
      ensureContours(); } // en 3D ocultamos las curvas (sobre el relieve parecen terrazas); al salir, vuelven
    // Cumbres: nombre + altitud de los picos (datos OSM, gratis) — lo que PeakVisor cobra
    function peakSource(){ const s=map.getStyle().sources||{}; return s.openmaptiles?"openmaptiles":(s.omt?"omt":null); }
    function ensurePeaks(){ if(!showPeaks){ if(map.getLayer("peaks")) map.removeLayer("peaks"); return; }
      const src=peakSource(); if(!src) return;
      if(!map.getLayer("peaks")) map.addLayer({ id:"peaks", type:"symbol", source:src, "source-layer":"mountain_peak", minzoom:9,
        layout:{ "text-field":["concat","▲ ",["coalesce",["get","name"],""],["case",["has","ele"],["concat","  ",["to-string",["round",["to-number",["get","ele"]]]],"m"],""]],
          "text-font":["Noto Sans Regular"], "text-size":11, "text-anchor":"top", "text-offset":[0,0.2], "text-max-width":9,
          "symbol-sort-key":["case",["has","rank"],["to-number",["get","rank"]],99] },
        paint:{ "text-color":"#f0c074", "text-halo-color":"#0c100e", "text-halo-width":1.5 } }); }

    let userLoc=null, dest=null, routeGeoJSON=null, trackGeoJSON=null, pin=null, userMarker=null, steps=[], heading=null;
    const saved=JSON.parse(localStorage.getItem("novara.saved")||"[]"); const savedMarkers=[];
    let currentFlavor="aventura", sendasOn=false;

    $("layersBtn").onclick=()=>{ $("actionsPanel").classList.remove("open"); $("layerPicker").classList.toggle("open"); };
    // Cambio de capa robusto: entre vector (liberty) y raster (satélite) el "style diff" de
    // MapLibre revienta (_checkLoaded / AbortError) → forzamos rebuild limpio (diff:false) y
    // bloqueamos clicks mientras se reconstruye, para que no se solapen dos setStyle.
    // Bloqueo durante el cambio de estilo CON failsafe: si style.load no llega (carreras raras),
    // se desbloquea solo a los 3,5 s → nunca se queda atascado el cambio de capa.
    let styleSwitching=false, switchTimer=null;
    function setFlavor(flavor){ if(styleSwitching||flavor===currentFlavor) return; styleSwitching=true; currentFlavor=flavor;
      clearTimeout(switchTimer); switchTimer=setTimeout(()=>{ styleSwitching=false; }, 3500);
      map.setStyle(buildStyle(flavor),{diff:false}); }
    // Refleja la capa elegida en los botones y cambia el estilo (mismo camino para botón y para 3D).
    function selectFlavor(flavor){ document.querySelectorAll(".lp[data-flavor]").forEach(x=>x.classList.toggle("on", x.dataset.flavor===flavor)); setFlavor(flavor); }
    // Aplica el terreno EN CUANTO el estilo esté listo (sondeo de isStyleLoaded, no dependemos del
    // evento style.load que a veces no llega tras un cambio de estilo) → robusto de verdad.
    function whenStyleReady(cb){ let n=0; const t=()=>{ n++; let ok=false; try{ ok=map.isStyleLoaded(); }catch(e){} if(ok){ try{ cb(); }catch(e){} } else if(n<120) setTimeout(t,80); }; setTimeout(t,80); }
    document.querySelectorAll(".lp[data-flavor]").forEach(b=>b.addEventListener("click",()=>{
      flavorBefore3D=null; selectFlavor(b.dataset.flavor); $("layerPicker").classList.remove("open"); }));
    $("curvasChip").onclick=()=>{ showContours=!showContours; $("curvasChip").classList.toggle("on",showContours); ensureContours(); };
    $("peaksChip").onclick=()=>{ showPeaks=!showPeaks; $("peaksChip").classList.toggle("on",showPeaks); ensurePeaks(); };
    // 3D = montaña fotorrealista: al activarlo salta a satélite (imagen real sobre el relieve); al
    // salir, vuelve a tu capa. El terreno se aplica con whenStyleReady (no se queda a medias).
    // 3D = montaña fotorrealista. En vez de cambiar de estilo (frágil), DRAPAMOS el satélite como
    // capas encima del mapa actual + relieve. Sin setStyle → sin carreras ni cuelgues. Al salir, se
    // quita el satélite y el mapa vuelve plano a tu capa.
    $("d3Chip").onclick=()=>{ is3D=!is3D; $("d3Chip").classList.toggle("on",is3D);
      ensureSatOverlay(); ensureContours(); applyTerrain(false); // pone/quita relieve SIN tocar la cámara
      // El inclinado lo controlamos aquí, explícito y fiable (no dentro de applyTerrain, que se pisa).
      if(is3D){ if(map.getPitch()<30) map.easeTo({ pitch:62, duration:650 }); }
      else setTimeout(()=>{ if(map.getPitch()>2) map.easeTo({ pitch:0, bearing:0, duration:450 }); }, 80); };
    $("sendasChip").onclick=()=>{ sendasOn=!sendasOn; $("sendasChip").classList.toggle("on",sendasOn);
      if(sendasOn) ensureSendas(); else { if(map.getLayer("sendas-layer")) map.removeLayer("sendas-layer"); if(map.getSource("sendas")) map.removeSource("sendas"); } };

    function ensureRouteLayer(){ if(!routeGeoJSON) return;
      if(!map.getSource("route")) map.addSource("route",{type:"geojson",data:routeGeoJSON}); else map.getSource("route").setData(routeGeoJSON);
      if(!map.getLayer("route-line")) map.addLayer({id:"route-line",type:"line",source:"route",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#34e0c4","line-width":6,"line-opacity":0.92}}); }
    function ensureTrackLayer(){ if(!trackGeoJSON) return;
      if(!map.getSource("track")) map.addSource("track",{type:"geojson",data:trackGeoJSON}); else map.getSource("track").setData(trackGeoJSON);
      if(!map.getLayer("track-line")) map.addLayer({id:"track-line",type:"line",source:"track",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#ff6a2c","line-width":5,"line-opacity":0.95}}); }
    function ensureSendas(){ if(!sendasOn) return;
      if(!map.getSource("sendas")) map.addSource("sendas",{type:"raster",tiles:SENDAS,tileSize:256,attribution:"© Waymarked Trails (CC-BY-SA)"});
      if(!map.getLayer("sendas-layer")) map.addLayer({id:"sendas-layer",type:"raster",source:"sendas",paint:{"raster-opacity":0.85}}); }
    function addOverlays(){ ensureHillshade(); ensureSatOverlay(); ensureContours(); ensurePeaks(); ensureRouteLayer(); ensureTrackLayer(); ensureSendas(); }
    map.on("style.load", ()=>{ styleSwitching=false; clearTimeout(switchTimer); addOverlays(); applyTerrain(false); updateCompass(); collapseAttrib(); setTimeout(addOverlays,700); });
    map.on("idle", addOverlays); // robusto: garantiza overlays (cumbres, curvas…) cuando el mapa se asienta

    // ===== brújula (orientación del mapa) + reset norte =====
    function updateCompass(){ $("compassRose").style.transform=`rotate(${-map.getBearing()}deg)`; }
    map.on("rotate", updateCompass); map.on("load", updateCompass);
    $("compass").onclick=()=>{ map.easeTo({bearing:0,pitch:0}); requestOrient(); };

    // ===== orientación del dispositivo (flecha "hacia dónde miramos") =====
    // La app nativa (apk) empuja el rumbo del sensor de rotación REAL del móvil → window.__novaraHeading.
    // Es mucho más preciso que el deviceorientation del navegador, así que cuando llega, manda él.
    let headingFromNative=false;
    window.__novaraHeading=function(deg){ if(typeof deg!=="number"||isNaN(deg)) return; headingFromNative=true; heading=(deg%360+360)%360; updateUserHeading(); };
    function onOrient(e){ if(headingFromNative) return; let h=null;
      if(e.webkitCompassHeading!=null) h=e.webkitCompassHeading;
      else if(e.absolute && e.alpha!=null) h=360-e.alpha;
      if(h==null) return; heading=(h%360+360)%360; updateUserHeading(); }
    window.addEventListener("deviceorientationabsolute", onOrient, true);
    window.addEventListener("deviceorientation", onOrient, true);
    function requestOrient(){ try{ if(typeof DeviceOrientationEvent!=="undefined" && DeviceOrientationEvent.requestPermission)
      DeviceOrientationEvent.requestPermission().then(s=>{ if(s==="granted") window.addEventListener("deviceorientation",onOrient,true); }).catch(()=>{}); }catch(e){} }
    // La flecha se dibuja sobre un marcador que NO gira con el mapa; para que apunte al rumbo
    // geográfico correcto hay que restarle el giro del mapa (bearing).
    function updateUserHeading(){ if(!userMarker||heading==null) return; const h=userMarker.getElement().querySelector(".uh");
      if(h) h.style.transform=`translate(-50%,-50%) rotate(${heading-map.getBearing()}deg)`; }
    map.on("rotate", updateUserHeading);

    function dropPin(lon,lat){ if(pin) pin.remove(); const el=document.createElement("div");
      el.style.cssText="width:18px;height:18px;border-radius:50%;background:#ff6a2c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)";
      pin=new maplibregl.Marker({element:el}).setLngLat([lon,lat]).addTo(map); }
    function userEl(){ const el=document.createElement("div"); el.style.cssText="position:relative;width:24px;height:24px;";
      el.innerHTML=`<div class="uh" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(0deg);width:0;height:0;"><div style="position:absolute;left:-10px;top:-24px;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:20px solid rgba(52,224,196,.6);"></div></div>
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#34e0c4;border:3px solid #fff;box-shadow:0 0 0 5px rgba(52,224,196,.25);"></div>`;
      return el; }
    function starMarker(lon,lat){ const el=document.createElement("div"); el.textContent="★"; el.style.cssText="font-size:22px;color:#ffce78;text-shadow:0 1px 3px #000;cursor:pointer";
      return new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map); }
    saved.forEach(s=>savedMarkers.push(starMarker(s.lon,s.lat)));
    function updateSavedCount(){ $("savedCount").textContent=saved.length?("★ "+saved.length):""; } updateSavedCount();

    const fmtDist=m=> m<1000? Math.round(m)+" m" : (m/1000).toFixed(m<10000?1:0)+" km";
    const fmtTime=s=>{ const m=Math.round(s/60); return m<60? m+" min" : Math.floor(m/60)+" h "+(m%60)+" min"; };
    function haversine(a,b){ const R=6371000,toR=x=>x*Math.PI/180; const dLat=toR(b.lat-a.lat),dLon=toR(b.lon-a.lon);
      const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(s)); }
    function getLoc(){ return new Promise((res,rej)=>{ if(!navigator.geolocation) return rej("Este navegador no da ubicación");
      navigator.geolocation.getCurrentPosition(p=>{ userLoc={lon:p.coords.longitude,lat:p.coords.latitude}; res(userLoc); },
        e=>rej(e.code===1?"Permiso de ubicación denegado — actívalo (icono del candado) para GPS, rumbo y rutas desde ti":"No pude obtener tu ubicación (señal GPS)"),
        {enableHighAccuracy:true,timeout:8000}); }); }

    const sheet=$("sheet");
    function showPlace(p){ dest=p; $("sheetTitle").textContent=p.name; $("sheetSub").textContent=p.sub||"";
      const bits=[]; if(p.cat) bits.push(p.cat); if(userLoc) bits.push("a "+fmtDist(haversine(userLoc,p))+" de ti");
      bits.push(p.lat.toFixed(5)+", "+p.lon.toFixed(5)); $("sheetMeta").textContent=bits.join(" · ");
      $("routeBox").style.display="none"; sheet.classList.add("open"); }
    $("sheetClose").onclick=()=>sheet.classList.remove("open");

    const MODEI={coche:"🚗",pie:"🚶",bici:"🚴"};
    async function routeTo(p, mode="coche"){
      let origin=userLoc; if(!origin){ try{ origin=await getLoc(); }catch(e){} } if(!origin){ origin={lon:map.getCenter().lng,lat:map.getCenter().lat}; }
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML="Calculando ruta…";
      try{ const url=`https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${p.lon},${p.lat}?overview=full&geometries=geojson&steps=true`;
        const j=await (await fetch(url)).json(); if(!j.routes||!j.routes[0]){ rb.innerHTML="Sin ruta disponible."; return; }
        const r=j.routes[0]; routeGeoJSON={type:"Feature",geometry:r.geometry}; ensureRouteLayer(); steps=(r.legs[0]&&r.legs[0].steps)||[];
        renderRouteBox(mode,r.distance,r.duration); elevationProfile(r.geometry.coordinates,$("elevBox"));
        const cs=r.geometry.coordinates,b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c)); map.fitBounds(b,{padding:{top:130,bottom:320,left:40,right:40}});
      }catch(e){ rb.innerHTML="Error de ruta"; showErr("ruta: "+e); } }
    function renderRouteBox(mode,distM,timeS){ const rb=$("routeBox");
      rb.innerHTML=`<div class="modes">${["coche","pie","bici"].map(m=>`<span class="mode ${m===mode?'on':''}" data-mode="${m}">${MODEI[m]}</span>`).join("")}<b style="margin-left:auto">${fmtDist(distM)} · ${fmtTime(timeS)}</b></div>
        <div id="modeNote" class="muted" style="margin-top:6px;font-size:12px;${mode==='coche'?'display:none':''}">Pie/bici: router propio (R5b). Mostrando coche.</div>
        <div id="elevBox"></div><button class="startnav" id="startNav">Iniciar navegación</button>`;
      rb.querySelectorAll(".mode").forEach(el=>el.onclick=()=>{ if(dest) routeTo(dest,el.dataset.mode); }); $("startNav").onclick=startNav; }
    function instr(step){ const m=step.maneuver,road=step.name||""; const d={left:"a la izquierda",right:"a la derecha","slight left":"ligeramente a la izda","slight right":"ligeramente a la dcha","sharp left":"cerrada a la izda","sharp right":"cerrada a la dcha",straight:"recto",uturn:"en U"}[m.modifier]||"";
      switch(m.type){ case "depart":return "Sal"+(road?" por "+road:""); case "turn":return "Gira "+d+(road?" hacia "+road:""); case "new name":return "Continúa"+(road?" por "+road:""); case "continue":return "Continúa "+d+(road?" por "+road:""); case "merge":return "Incorpórate"+(road?" a "+road:""); case "roundabout": case "rotary":return "En la rotonda toma la salida"+(m.exit?" "+m.exit:"")+(road?" hacia "+road:""); case "end of road":return "Al final gira "+d+(road?" hacia "+road:""); case "fork":return "Mantente "+d+(road?" hacia "+road:""); case "arrive":return "Has llegado"+(road?" a "+road:""); default:return ((m.type+" "+d).trim()||"Sigue")+(road?" por "+road:""); } }
    function startNav(){ if(!steps.length) return; sheet.classList.remove("open"); $("navInstr").textContent=instr(steps[0]); $("navEta").textContent=steps.length+" maniobras";
      $("navSteps").innerHTML=steps.map(s=>{ const dm=s.distance,dt=dm<1000?Math.round(dm)+" m":(dm/1000).toFixed(1)+" km"; return `<div class="step">${instr(s)} <span class="muted">${dt}</span></div>`; }).join(""); $("navBanner").style.display="block"; }
    $("navExit").onclick=()=>{ $("navBanner").style.display="none"; };
    $("actGo").onclick=()=>{ if(dest) routeTo(dest,"coche"); };

    // perfil de elevación (Open-Meteo)
    function sampleCoords(c,n){ if(c.length<=n) return c; const o=[],st=(c.length-1)/(n-1); for(let i=0;i<n;i++) o.push(c[Math.round(i*st)]); return o; }
    async function elevationProfile(coords,mount){ if(!mount||!coords||coords.length<2) return;
      try{ const pts=sampleCoords(coords,48),lat=pts.map(c=>c[1].toFixed(5)).join(","),lon=pts.map(c=>c[0].toFixed(5)).join(",");
        const j=await (await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`)).json(); const el=j.elevation; if(!el||!el.length) return;
        let asc=0,desc=0; for(let i=1;i<el.length;i++){ const dd=el[i]-el[i-1]; if(dd>0)asc+=dd; else desc+=-dd; }
        const mn=Math.min(...el),mx=Math.max(...el),n=el.length,W=260,H=54,X=i=>(i/(n-1))*W,Y=v=>H-4-((v-mn)/((mx-mn)||1))*(H-10);
        let d="M "+X(0).toFixed(1)+" "+Y(el[0]).toFixed(1); for(let i=1;i<n;i++) d+=" L "+X(i).toFixed(1)+" "+Y(el[i]).toFixed(1);
        mount.innerHTML=`<div style="margin-top:10px"><svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none"><path d="${d} L ${W} ${H} L 0 ${H} Z" fill="rgba(52,224,196,.18)"/><path d="${d}" fill="none" stroke="#34e0c4" stroke-width="2"/></svg><div class="muted" style="font-size:12px;margin-top:4px">↗ +${Math.round(asc)} m · ↘ -${Math.round(desc)} m · máx ${Math.round(mx)} m</div></div>`;
      }catch(e){} }

    $("actSave").onclick=()=>{ if(!dest) return; saved.push({name:dest.name,lon:dest.lon,lat:dest.lat}); localStorage.setItem("novara.saved",JSON.stringify(saved)); savedMarkers.push(starMarker(dest.lon,dest.lat)); updateSavedCount(); $("actSave").textContent="✓ Guardado"; setTimeout(()=>$("actSave").textContent="Guardar",1500); };
    $("actShare").onclick=()=>{ if(!dest) return; const t=`${dest.name} — https://www.openstreetmap.org/?mlat=${dest.lat}&mlon=${dest.lon}#map=16/${dest.lat}/${dest.lon}`; if(navigator.clipboard) navigator.clipboard.writeText(t).then(()=>{ $("actShare").textContent="✓ Copiado"; setTimeout(()=>$("actShare").textContent="Compartir",1500); }).catch(()=>{}); };

    const q=$("q"),results=$("results"); let timer=null;
    q.addEventListener("input",()=>{ clearTimeout(timer); const v=q.value.trim(); if(v.length<3){ results.classList.remove("show"); return; } timer=setTimeout(()=>doSearch(v),280); });
    async function doSearch(v){ try{ const j=await (await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(v)}&limit=6&lang=default`)).json(); results.innerHTML="";
        (j.features||[]).forEach(f=>{ const p=f.properties,[lon,lat]=f.geometry.coordinates; const name=p.name||p.street||"(sin nombre)"; const sub=[p.city,p.state,p.country].filter(Boolean).join(", "); const cat=p.osm_value||p.type||"";
          const row=document.createElement("div"); row.className="row"; row.innerHTML=`<div class="t">${name}</div><div class="s">${sub}</div>`;
          row.onclick=()=>{ results.classList.remove("show"); q.value=name; map.flyTo({center:[lon,lat],zoom:14}); dropPin(lon,lat); showPlace({name,sub,lon,lat,cat}); }; results.appendChild(row); });
        results.classList.add("show"); }catch(e){ showErr("búsqueda: "+e); } }

    $("locBtn").onclick=async()=>{ requestOrient(); try{ const l=await getLoc(); if(userMarker) userMarker.remove(); userMarker=new maplibregl.Marker({element:userEl()}).setLngLat([l.lon,l.lat]).addTo(map); updateUserHeading(); map.flyTo({center:[l.lon,l.lat],zoom:15}); }catch(e){ showErr("ubicación: "+e); } };

    map.on("contextmenu", e=>{ const {lng,lat}=e.lngLat; dropPin(lng,lat); showPlace({name:"Punto en el mapa",sub:"",lon:lng,lat,cat:""}); });

    // R6 grabar track + TrackBack
    let recording=false,watchId=null,track=[],lastTrack=null;
    function trackDist(t){ let d=0; for(let i=1;i<t.length;i++) d+=haversine({lon:t[i-1][0],lat:t[i-1][1]},{lon:t[i][0],lat:t[i][1]}); return d; }
    function toggleRecord(){ if(recording){ stopRecord(); return; } if(!navigator.geolocation){ showErr("sin GPS"); return; }
      requestOrient(); recording=true; track=[]; $("trackBtn").textContent="■"; const rp=$("recPill"); rp.style.display="block"; rp.textContent="● Grabando · 0 m";
      watchId=navigator.geolocation.watchPosition(pos=>{ track.push([pos.coords.longitude,pos.coords.latitude]); trackGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates:track.length>1?track:[track[0],track[0]]}}; ensureTrackLayer(); rp.textContent="● Grabando · "+fmtDist(trackDist(track))+" · "+track.length+" pts"; if(track.length===1) map.flyTo({center:track[0],zoom:16}); }, e=>showErr("GPS: "+e.message), {enableHighAccuracy:true,maximumAge:1000}); }
    function stopRecord(){ recording=false; if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; } $("trackBtn").textContent="▶"; $("recPill").style.display="none";
      if(track.length<2){ showPlace({name:"Track sin movimiento",sub:"Muévete para grabar un recorrido.",lon:map.getCenter().lng,lat:map.getCenter().lat}); return; }
      lastTrack=track.slice(); const tr=JSON.parse(localStorage.getItem("novara.tracks")||"[]"); tr.push({when:Date.now(),pts:lastTrack}); localStorage.setItem("novara.tracks",JSON.stringify(tr));
      $("sheetTitle").textContent="✓ Track guardado"; $("sheetSub").textContent=fmtDist(trackDist(lastTrack))+" · "+lastTrack.length+" puntos"; $("sheetMeta").textContent="";
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML=`<div id="elevBox"></div><button class="startnav" id="tbBtn">↩ TrackBack — volver por tu rastro</button>`; elevationProfile(lastTrack,$("elevBox")); $("tbBtn").onclick=trackBack; sheet.classList.add("open"); }
    function trackBack(){ if(!lastTrack||lastTrack.length<2) return; routeGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates:lastTrack.slice().reverse()}}; ensureRouteLayer();
      const cs=routeGeoJSON.geometry.coordinates,b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c)); map.fitBounds(b,{padding:70}); $("sheetTitle").textContent="↩ TrackBack activo"; $("sheetSub").textContent="Sigue la línea para volver por donde viniste"; }

    // ----- Mensaje a un contacto (off-grid por LoRa cuando no hay cobertura) -----
    // Abre una URL externa (WhatsApp/SMS/email). En la app nativa via puente; en navegador, window.open.
    function openExternal(url){ if(NATIVE&&NATIVE.openExternal){ try{ NATIVE.openExternal(url); return true; }catch(_){} return false; }
      try{ window.open(url,"_blank"); return true; }catch(_){ return false; } }
    // Entrega REAL al destinatario que elija el usuario.
    function deliverMessage(to,msg){ const raw=(to||"").trim();
      const digits=raw.replace(/[^\d+]/g,""); const isPhone=/^\+?\d{6,15}$/.test(digits); const isEmail=/^\S+@\S+\.\S+$/.test(raw);
      if(isPhone){ const num=digits.replace(/^\+/,""); const ext=openExternal(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        if(ext) return {ok:true,how:`WhatsApp a ${raw}`}; // si no se pudo abrir, cae a SMS
        if(openExternal(`sms:${digits}?body=${encodeURIComponent(msg)}`)) return {ok:true,how:`SMS a ${raw}`}; }
      if(isEmail){ if(openExternal(`mailto:${encodeURIComponent(raw)}?subject=${encodeURIComponent("Mensaje NOVARA")}&body=${encodeURIComponent(msg)}`)) return {ok:true,how:`email a ${raw}`}; }
      // contacto por nombre / sin formato claro → hoja de compartir nativa (eliges app y contacto)
      const text=(raw?("Para "+raw+": "):"")+msg;
      if(NATIVE&&NATIVE.share){ try{ NATIVE.share(text); return {ok:true,how:"elige el contacto"}; }catch(_){} }
      if(navigator.share){ navigator.share({text}).catch(()=>{}); return {ok:true,how:"elige el contacto"}; }
      if(navigator.clipboard){ navigator.clipboard.writeText(text); return {ok:true,how:"copiado al portapapeles"}; }
      return {ok:false}; }

      $("meshSend").onclick=()=>{ const to=($("meshTo").value||"").trim(); const t=($("meshTxt").value||"").trim();

    // ----- Descargar esta zona: DESCARGA REAL de teselas a la caché del Service Worker -----
    const lon2t=(lo,z)=>Math.floor((lo+180)/360*Math.pow(2,z));
    const lat2t=(la,z)=>{ const r=la*Math.PI/180; return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); };
    function tilesIn(b,z){ const out=[],x0=lon2t(b.getWest(),z),x1=lon2t(b.getEast(),z),y0=lat2t(b.getNorth(),z),y1=lat2t(b.getSouth(),z);
      for(let x=Math.min(x0,x1);x<=Math.max(x0,x1);x++) for(let y=Math.min(y0,y1);y<=Math.max(y0,y1);y++) out.push([z,x,y]); return out; }
    async function zoneUrls(b,z0,flavor){ const tpls=["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"]; // DEM = relieve/curvas/3D
      if(flavor==="satelite"){ tpls.push(SAT[0]); tpls.push(PNOA[0]); }
      else { try{ const tj=await (await fetch(OMT_PLANET)).json(); if(tj.tiles&&tj.tiles[0]) tpls.push(tj.tiles[0]); }catch(e){} } // plantilla real del vector
      const urls=new Set();
      for(let z=z0; z<=z0+2; z++){ for(const [zz,x,y] of tilesIn(b,z)) for(const t of tpls) urls.add(t.replace("{z}",zz).replace("{x}",x).replace("{y}",y)); if(urls.size>800) break; }
      return [...urls]; }
    async function cachedMB(){ try{ const e=await navigator.storage.estimate(); return (e.usage/1e6).toFixed(0); }catch(_){ return "?"; } }
    $("aDownload").onclick=async()=>{ closeActions(); const b=map.getBounds(), z=Math.round(map.getZoom()), c=map.getCenter();
      const swOk="serviceWorker" in navigator && navigator.serviceWorker.controller;
      const urls=await zoneUrls(b,z,currentFlavor);
      openModal(`<div class="m-emoji">⬇️</div><h2>Descargar esta zona</h2>
        <p class="m-sub">Descarga REAL: guarda las teselas (vector + relieve + ${currentFlavor==="satelite"?"satélite":"cumbres"}) en el móvil para usar el mapa <b>sin cobertura</b>.</p>
        <div class="m-coords">${c.lat.toFixed(3)}, ${c.lng.toFixed(3)} · zoom ${z}–${z+2}<br>${urls.length.toLocaleString("es")} teselas a descargar</div>
        ${swOk?"":'<p class="m-sub" style="color:#f0b24a">⚠️ Recarga la app una vez para activar el motor offline (Service Worker) y luego descarga.</p>'}
        <button class="m-primary" id="dlGo">Descargar ${urls.length} teselas</button><div id="dlProg"></div>`);
      $("dlGo").onclick=async()=>{ $("dlGo").disabled=true; const box=$("dlProg");
        box.innerHTML=`<div class="m-prog"><i></i></div><div id="dlPct" style="font-size:12px;margin-top:8px;text-align:center;color:var(--muted)">Descargando…</div>`;
        const bar=box.querySelector("i"); let done=0;
        const batch=8; for(let i=0;i<urls.length;i+=batch){ await Promise.all(urls.slice(i,i+batch).map(u=>fetch(u,{mode:"no-cors"}).catch(()=>{}))); done=Math.min(i+batch,urls.length);
          bar.style.width=(done/urls.length*100)+"%"; $("dlPct").textContent=Math.round(done/urls.length*100)+"% · "+done+"/"+urls.length+" teselas"; }
        const mb=await cachedMB(); bar.style.width="100%"; $("dlPct").textContent=`✓ Zona disponible sin conexión · ${mb} MB en caché`; $("dlGo").textContent="✓ Zona descargada";
        const zs=JSON.parse(localStorage.getItem("novara.zones")||"[]"); zs.push({when:Date.now(),lat:c.lat,lon:c.lng,z,tiles:urls.length}); localStorage.setItem("novara.zones",JSON.stringify(zs)); }; };

    // ----- Planificar ruta (multi-punto, OSRM) -----
    function planMarkerEl(n){ const el=document.createElement("div"); el.textContent=n;
      el.style.cssText="width:24px;height:24px;border-radius:50%;background:#34e0c4;color:#06201b;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"; return el; }
    function exitPlanMode(clearRoute){ planMode=false; hideHint(); $("planbar").classList.remove("show"); planMarkers.forEach(m=>m.remove()); planMarkers=[]; planPts=[];
      if(clearRoute){ routeGeoJSON=null; if(map.getLayer("route-line")) map.removeLayer("route-line"); if(map.getSource("route")) map.removeSource("route"); } }
    function enterPlanMode(){ exitPlanMode(false); planMode=true; showHint("🧭 Toca el mapa para añadir puntos de la ruta"); $("planbar").classList.add("show"); pbInfo(); }
    function pbInfo(){ $("pbInfo").innerHTML=`<b>Planificando ruta</b><br><span class="muted">${planPts.length} punto(s) — toca el mapa</span>`; }
    function addPlanPoint(lon,lat){ planPts.push([lon,lat]); planMarkers.push(new maplibregl.Marker({element:planMarkerEl(planPts.length)}).setLngLat([lon,lat]).addTo(map));
      if(planPts.length>=2) planRoute(); else pbInfo(); }
    async function planRoute(){ const coords=planPts.map(p=>p[0]+","+p[1]).join(";");
      try{ const j=await (await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=true`)).json();
        if(!j.routes||!j.routes[0]){ showErr("Sin ruta entre esos puntos"); return; } const r=j.routes[0];
        routeGeoJSON={type:"Feature",geometry:r.geometry}; ensureRouteLayer(); steps=[].concat(...(r.legs||[]).map(l=>l.steps||[]));
        $("pbInfo").innerHTML=`<b>${fmtDist(r.distance)} · ${fmtTime(r.duration)}</b><br><span class="muted">${planPts.length} puntos · toca para añadir más</span>`;
      }catch(e){ showErr("ruta: "+e); } }
    $("aPlan").onclick=()=>{ closeActions(); enterPlanMode(); };
    $("pbClear").onclick=enterPlanMode;
    $("pbCancel").onclick=()=>exitPlanMode(true);
    $("pbGo").onclick=()=>{ if(steps&&steps.length){ exitPlanMode(false); startNav(); } else showErr("Añade al menos 2 puntos"); };

    // ----- Puntos de interés (Overpass / OSM, gratis) -----
    const POI_CATS={ refugio:{label:"🛖 Refugios",q:'node["tourism"~"alpine_hut|wilderness_hut"];node["amenity"="shelter"];'},
      agua:{label:"💧 Agua",q:'node["amenity"="drinking_water"];node["natural"="spring"];'},
      cumbre:{label:"🗻 Cumbres",q:'node["natural"="peak"];'},
      parking:{label:"🅿️ Aparcar",q:'node["amenity"="parking"];'},
      comida:{label:"🍴 Comida",q:'node["amenity"~"restaurant|cafe|bar|fast_food"];'} };
    let poiMarkers=[]; const clearPoi=()=>{ poiMarkers.forEach(m=>m.remove()); poiMarkers=[]; };
    // Overpass público se satura y devuelve XML de error → probamos varios espejos y parseamos a prueba de fallos.
    const OVERPASS=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter","https://maps.mail.ru/osm/tools/overpass/api/interpreter"];
    async function overpass(ql){ for(const ep of OVERPASS){ try{ const r=await fetch(ep,{method:"POST",body:ql}); if(!r.ok) continue; const t=(await r.text()).trim(); if(t[0]!=="{") continue; return JSON.parse(t); }catch(e){} } return null; }
    $("aPoi").onclick=()=>{ closeActions(); openModal(`<div class="m-emoji">⭐</div><h2>Puntos de interés</h2>
      <p class="m-sub">Cerca de lo que ves en el mapa (datos OSM, gratis).</p>
      <div class="m-cats">${Object.entries(POI_CATS).map(([k,v])=>`<button class="m-cat" data-poi="${k}">${v.label}</button>`).join("")}</div>
      <div id="poiOut" style="margin-top:14px"></div>`);
      document.querySelectorAll(".m-cat").forEach(b=>b.onclick=()=>runPoi(b.dataset.poi)); };
    async function runPoi(cat){ const out=$("poiOut"); out.innerHTML='<div style="color:var(--muted);font-size:13px">Buscando…</div>';
      const b=map.getBounds(), bbox=`${b.getSouth().toFixed(4)},${b.getWest().toFixed(4)},${b.getNorth().toFixed(4)},${b.getEast().toFixed(4)}`;
      const inner=POI_CATS[cat].q.replace(/;/g,`(${bbox});`), ql=`[out:json][timeout:25];(${inner});out center 40;`;
      try{ const j=await overpass(ql); if(!j) throw new Error("sin respuesta");
        clearPoi(); const els=(j.elements||[]).filter(e=>e.lat||e.center);
        if(!els.length){ out.innerHTML='<div style="color:var(--muted);font-size:13px">Nada por aquí. Aleja o mueve el mapa y reintenta.</div>'; return; }
        const items=els.slice(0,40).map(e=>{ const lat=e.lat||e.center.lat, lon=e.lon||e.center.lon;
          const name=(e.tags&&(e.tags.name||e.tags.ele&&(e.tags.ele+" m")))||POI_CATS[cat].label.replace(/^\S+\s/,"");
          const el=document.createElement("div"); el.textContent="📍"; el.style.cssText="font-size:20px;cursor:pointer";
          poiMarkers.push(new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map)); return {name,lat,lon}; });
        out.innerHTML=`<div class="m-list">${items.map((p,i)=>`<div class="pr" data-i="${i}"><b>${p.name}</b>${userLoc?` <span class="d">· a ${fmtDist(haversine(userLoc,{lon:p.lon,lat:p.lat}))}</span>`:""}</div>`).join("")}</div>`;
        out.querySelectorAll(".pr").forEach(r=>r.onclick=()=>{ const p=items[+r.dataset.i]; closeModal(); map.flyTo({center:[p.lon,p.lat],zoom:15}); dropPin(p.lon,p.lat); showPlace({name:p.name,sub:POI_CATS[cat].label,lon:p.lon,lat:p.lat,cat:""}); });
      }catch(e){ out.innerHTML='<div style="color:var(--muted);font-size:13px">Overpass no responde ahora, reintenta.</div>'; } }

    // ----- Análisis del dispositivo: la app comprueba qué puede hacer ESTE móvil -----
    const NATIVE = (window.Novara && typeof window.Novara.platform==="function") ? window.Novara : null;
    async function runDiag(){ const c=[]; const add=(emoji,name,status,note)=>c.push({emoji,name,status,note}); // status: ok|maybe|no
      // GPS (intento real de fix)
      let g={s:"no",n:"No disponible en este dispositivo"};
      if(navigator.geolocation){ g={s:"maybe",n:"Disponible — falta conceder permiso"};
        try{ const p=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000,enableHighAccuracy:true}));
          userLoc={lon:p.coords.longitude,lat:p.coords.latitude}; g={s:"ok",n:`Activo · precisión ±${Math.round(p.coords.accuracy)} m`};
        }catch(e){ g=e&&e.code===1?{s:"no",n:"Permiso denegado — actívalo en el candado"}:{s:"maybe",n:"Sin señal GPS aún (prueba al aire libre)"}; } }
      add("📍","Ubicación GPS",g.s,g.n);
      // Galileo: en la app nativa (apk6) sí leemos la constelación real vía GnssStatus.
      if(NATIVE){ let gn=null; try{ gn=JSON.parse(NATIVE.gnss()); }catch(_){}
        if(gn&&gn.galileoUsed>0) add("🛰️","Galileo / multi-GNSS","ok",`Galileo EN USO · ${gn.galileoUsed} satélites fijando (${gn.galileoSeen} a la vista) · total ${gn.totalUsed}`);
        else if(gn&&gn.galileoSeen>0) add("🛰️","Galileo / multi-GNSS","maybe",`Galileo visible (${gn.galileoSeen}); fijando posición…`);
        else add("🛰️","Galileo / multi-GNSS","maybe","GNSS nativo activo; buscando Galileo (sal a cielo abierto)");
      } else add("🛰️","Galileo / multi-GNSS","maybe","Posición sí; leer la constelación Galileo = solo app nativa (apk)");
      // Brújula (intento real de leer rumbo)
      let cp={s:"no",n:"Sensor no detectado"};
      if(window.DeviceOrientationEvent){ cp={s:"maybe",n:"Sensor presente — falta permiso"};
        const ok=await new Promise(res=>{ let d=false; const h=e=>{ const hd=e.webkitCompassHeading!=null?e.webkitCompassHeading:(e.absolute&&e.alpha!=null?360-e.alpha:null); if(hd!=null&&!d){ d=true; window.removeEventListener("deviceorientation",h); res(true);} };
          window.addEventListener("deviceorientation",h,true); setTimeout(()=>{ if(!d){ window.removeEventListener("deviceorientation",h); res(false);} },1400); });
        cp= ok?{s:"ok",n:"Rumbo en vivo (la flecha apunta a donde miras)"}:(typeof DeviceOrientationEvent.requestPermission==="function"?{s:"maybe",n:"Toca la brújula para conceder (iOS)"}:{s:"maybe",n:"Presente; aún sin lecturas"}); }
      add("🧭","Brújula / rumbo",cp.s,cp.n);
      add("📐","Acelerómetro / giro", window.DeviceMotionEvent?"ok":"no", window.DeviceMotionEvent?"Presente (inclinación, pasos)":"No disponible");
      // Mapas offline (Service Worker + caché + espacio)
      let off={s:"no",n:"Este navegador no soporta offline"};
      if("serviceWorker" in navigator && "caches" in window){ const ctrl=!!navigator.serviceWorker.controller; off={s:ctrl?"ok":"maybe",n:ctrl?"Motor offline ACTIVO":"Activo tras recargar una vez"};
        try{ const e=await navigator.storage.estimate(); off.n+=` · ${(e.usage/1e6).toFixed(0)} MB en caché · ~${((e.quota-e.usage)/1e9).toFixed(1)} GB libres`; }catch(_){} }
      add("⬇️","Mapas offline",off.s,off.n);
      // Bluetooth → módulo LoRa
      let bt={s:"no",n:"No soportado en este navegador (usa la app nativa)"};
      if(NATIVE){ let ok=false; try{ ok=NATIVE.bluetoothSupported(); }catch(_){} bt= ok?{s:"ok",n:"Bluetooth LE disponible para módulo LoRa/Meshtastic"}:{s:"no",n:"Este móvil no tiene Bluetooth LE"}; }
      else if(navigator.bluetooth){ bt={s:"ok",n:"Puedes emparejar un módulo LoRa/Meshtastic por Bluetooth"};
        try{ const av=await navigator.bluetooth.getAvailability(); if(!av) bt={s:"maybe",n:"API presente; enciende el Bluetooth"}; }catch(_){} }
      add("📡","Bluetooth (módulo LoRa)",bt.s,bt.n);
      const canShare=NATIVE||navigator.share;
      add("🆘","Compartir / SOS", canShare?"ok":"maybe", canShare?"Compartir nativo (difundir posición)":"Copia al portapapeles");
      add("☎️","Llamada de emergencia 112","ok","Disponible");
      add("📳","Vibración / alertas", navigator.vibrate?"ok":"no", navigator.vibrate?"Disponible":"No disponible");
      add("🔆","Pantalla activa en ruta", ("wakeLock" in navigator)?"ok":"maybe", ("wakeLock" in navigator)?"Mantiene la pantalla encendida":"Limitado en este navegador");
      const cn=navigator.connection; add("🌐","Conexión", navigator.onLine?"ok":"maybe", navigator.onLine?("En línea"+(cn&&cn.effectiveType?" · "+cn.effectiveType:"")):"Sin conexión (modo offline)");
      add("🛰️","SOS satélite del móvil","maybe","Depende del modelo/OS — lo gestiona el sistema (iPhone 14+, Pixel 9+…)");
      return c; }
    $("aDiag").onclick=async()=>{ closeActions(); requestOrient();
      openModal(`<div class="m-emoji">🔎</div><h2>Análisis de tu móvil</h2>
        <p class="m-sub">NOVARA comprueba qué puede hacer ESTE dispositivo. <span style="color:#3ad07a">●</span> listo · <span style="color:#f0b24a">●</span> con permiso/condición · <span style="color:#e23b34">●</span> no disponible.</p>
        <div id="diagOut"><div style="text-align:center;color:var(--muted);font-size:13px;padding:24px">Analizando hardware… (concede permisos si los pide)</div></div>`);
      const checks=await runDiag(); const dot={ok:"#3ad07a",maybe:"#f0b24a",no:"#e23b34"}, okN=checks.filter(c=>c.status==="ok").length;
      let modeBanner=""; if(NATIVE){ let v=""; try{ v=NATIVE.appVersion(); }catch(_){} modeBanner=`<div style="text-align:center;margin-bottom:8px"><span style="display:inline-block;padding:5px 12px;border-radius:20px;background:rgba(52,224,196,.16);border:1px solid rgba(52,224,196,.5);color:var(--cool);font-size:12px;font-weight:800">📱 App nativa ${v||"apk6"} · Galileo + LoRa activos</span></div>`; }
      $("diagOut").innerHTML=`${modeBanner}<div style="text-align:center;font-weight:800;font-size:16px;margin-bottom:4px">${okN} de ${checks.length} funciones listas</div>
        <div class="m-sub" style="margin-bottom:12px">en este móvil, ahora mismo</div>
        <div class="m-list">${checks.map(c=>`<div class="pr" style="display:flex;align-items:center;gap:11px;cursor:default">
          <span style="width:11px;height:11px;border-radius:50%;background:${dot[c.status]};flex:none;box-shadow:0 0 8px ${dot[c.status]}66"></span>
          <span style="flex:1"><b>${c.emoji} ${c.name}</b><br><span class="d">${c.note}</span></span></div>`).join("")}</div>`; };

    // onboarding fricción-cero (una vez): explica y activa el GPS de un toque
    if(!localStorage.getItem("novara.onboarded")) setTimeout(()=>$("onboard").classList.add("show"),900);
    $("obAllow").onclick=()=>{ localStorage.setItem("novara.onboarded","1"); $("onboard").classList.remove("show"); requestOrient(); $("locBtn").click(); };
    $("obSkip").onclick=()=>{ localStorage.setItem("novara.onboarded","1"); $("onboard").classList.remove("show"); };
  </script>
</body>
</html>
