<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NOVARA — prototype</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/maplibre-contour@0.1.0/dist/index.min.js"></script>
  <style>
    :root{ --bg:#0c100e; --panel:rgba(12,16,14,.72); --ink:#f2f5f3; --muted:#93a39b;
           --hair:rgba(255,255,255,.10); --warm:#ff6a2c; --cool:#34e0c4; }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; background:var(--bg); font-family:-apple-system,system-ui,"Segoe UI",sans-serif; color:var(--ink); }
    #map{ position:absolute; inset:0; }

    .search{ position:fixed; top:14px; left:14px; right:74px; z-index:6; }
    .search .box{ display:flex; align-items:center; gap:10px; padding:11px 14px;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.35); }
    .search .logo{ font-weight:800; letter-spacing:.16em; font-size:13px; }
    .search input{ flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-size:15px; }
    .search input::placeholder{ color:var(--muted); }
    #savedCount{ color:var(--cool); font-size:12px; font-weight:700; }
    .results{ margin-top:8px; background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:14px; overflow:hidden; display:none; }
    .results.show{ display:block; }
    .results .row{ padding:11px 14px; border-bottom:1px solid var(--hair); cursor:pointer; }
    .results .row:last-child{ border-bottom:0; }
    .results .t{ font-size:14px; } .results .s{ font-size:12px; color:var(--muted); }

    /* brújula siempre presente */
    .compass{ position:fixed; top:12px; right:14px; z-index:6; width:48px; height:48px; border-radius:50%;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); cursor:pointer;
      display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,0,0,.4); }
    .compass .rose{ width:100%; height:100%; position:relative; transition:transform .12s linear; }
    .compass .rose::before{ content:""; position:absolute; top:7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:15px solid var(--warm); }
    .compass .rose::after{ content:""; position:absolute; bottom:7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-top:15px solid #5b6b63; }
    .compass .n{ position:absolute; top:-2px; left:50%; transform:translateX(-50%); color:var(--warm); font-weight:800; font-size:10px; }

    .navbanner{ position:fixed; top:14px; left:14px; right:14px; z-index:8; background:rgba(12,16,14,.94); backdrop-filter:blur(12px); border:1px solid var(--hair); border-radius:16px; padding:14px 16px; box-shadow:0 6px 22px rgba(0,0,0,.55); }
    .navbanner .ni{ font-size:17px; font-weight:700; cursor:pointer; }
    .navbanner .nmeta{ display:flex; justify-content:space-between; color:var(--muted); font-size:13px; margin-top:6px; }
    .navbanner .nmeta .exit{ color:#ff8a8a; cursor:pointer; font-weight:700; }
    .navbanner .steps{ display:none; margin-top:10px; max-height:42vh; overflow:auto; border-top:1px solid var(--hair); padding-top:8px; }
    .navbanner .steps.show{ display:block; }
    .navbanner .step{ padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    .navbanner .step .muted{ color:var(--muted); }

    .recpill{ position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:8; background:rgba(255,106,44,.94); color:#1a0d06; font-weight:800; font-size:13px; padding:9px 16px; border-radius:20px; box-shadow:0 4px 16px rgba(0,0,0,.4); }

    /* selector de capas (un botón → panel), en vez de 5 chips sueltos */
    .layerpicker{ position:fixed; right:14px; bottom:300px; z-index:6; width:230px; display:none;
      background:var(--panel); backdrop-filter:blur(14px); border:1px solid var(--hair); border-radius:16px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .layerpicker.open{ display:block; }
    .lp-title{ color:var(--muted); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin:2px 2px 8px; }
    .lp-types{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .lp{ padding:11px 8px; border-radius:11px; border:1px solid var(--hair); background:rgba(255,255,255,.05); color:var(--ink); font-size:13px; font-weight:600; cursor:pointer; text-align:center; width:100%; }
    .lp.on{ color:var(--cool); border-color:rgba(52,224,196,.55); background:rgba(52,224,196,.16); }
    .lp.overlay{ text-align:left; }
    .lp.overlay.on{ color:var(--warm); border-color:rgba(255,106,44,.55); background:rgba(255,106,44,.16); }

    .fabs{ position:fixed; right:14px; bottom:120px; z-index:5; display:flex; flex-direction:column; gap:12px; }
    .fab{ width:52px; height:52px; border-radius:50%; border:1px solid var(--hair); background:rgba(18,23,20,.9); backdrop-filter:blur(12px); color:var(--ink); font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.4); }
    .fab.accent{ background:var(--warm); color:#1a0d06; border-color:transparent; }

    .sheet{ position:fixed; left:0; right:0; bottom:0; z-index:7; display:none; background:var(--bg); border-top-left-radius:20px; border-top-right-radius:20px; border-top:1px solid var(--hair); box-shadow:0 -8px 30px rgba(0,0,0,.5); padding:8px 18px 22px; max-height:85vh; overflow-y:auto; }
    .sheet.open{ display:block; }
    .sheet .grab{ width:42px; height:5px; border-radius:3px; background:#3a463f; margin:6px auto 12px; }
    .sheet h2{ margin:0; font-size:19px; }
    .sheet .sub{ color:var(--muted); font-size:13px; margin-top:3px; }
    .sheet .meta{ color:var(--muted); font-size:12px; margin-top:8px; }
    .sheet .routebox{ margin-top:14px; padding:12px 14px; border-radius:12px; border:1px solid rgba(52,224,196,.4); background:rgba(52,224,196,.10); font-size:14px; }
    .routebox .muted{ color:var(--muted); }
    .routebox .modes{ display:flex; align-items:center; gap:8px; }
    .routebox .mode{ padding:6px 10px; border-radius:9px; border:1px solid var(--hair); cursor:pointer; font-size:16px; }
    .routebox .mode.on{ border-color:rgba(52,224,196,.6); background:rgba(52,224,196,.16); }
    .routebox .startnav{ margin-top:12px; width:100%; padding:12px; border-radius:12px; border:0; background:var(--cool); color:#06201b; font-weight:800; font-size:15px; cursor:pointer; }
    .sheet .acts{ display:flex; gap:10px; margin-top:16px; }
    .sheet .acts button{ flex:1; padding:13px 8px; border-radius:14px; border:1px solid var(--hair); background:rgba(255,255,255,.06); color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }
    .sheet .acts button.primary{ background:var(--warm); color:#1a0d06; border-color:transparent; }
    .sheet .close{ position:absolute; top:14px; right:16px; color:var(--muted); cursor:pointer; font-size:18px; }

    /* toast de error: se evapora a 2s, no tapa nada */
    #err{ position:fixed; left:50%; bottom:86px; transform:translateX(-50%); z-index:9; background:rgba(150,40,40,.92); color:#ffe3e3; font:12px/1.4 sans-serif; padding:9px 16px; border-radius:14px; display:none; max-width:84%; text-align:center; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.4); }

    /* atribución: obligatoria por licencia, pero colapsada a un (i) discreto (no texto fijo) */
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) .maplibregl-ctrl-attrib-inner{ display:none !important; }
    .maplibregl-ctrl-attrib{ background:rgba(12,16,14,.45) !important; border-radius:11px !important; font-size:10px; }
    .maplibregl-ctrl-attrib a, .maplibregl-ctrl-attrib{ color:#7d8a83 !important; }
    .maplibregl-ctrl-attrib-button{ background-color:rgba(12,16,14,.55) !important; }

    /* onboarding fricción-cero: activar ubicación de un toque */
    .onboard{ position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); display:none; align-items:flex-end; }
    .onboard.show{ display:flex; }
    .ob-card{ background:var(--bg); border-top-left-radius:22px; border-top-right-radius:22px; border-top:1px solid var(--hair); padding:26px 22px 30px; width:100%; text-align:center; box-shadow:0 -10px 40px rgba(0,0,0,.6); }
    .ob-emoji{ font-size:40px; } .ob-card h3{ margin:10px 0 6px; font-size:21px; } .ob-card p{ color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 12px; }
    .ob-card button{ width:100%; padding:14px; border-radius:14px; border:0; font-size:15px; font-weight:800; cursor:pointer; margin-top:10px; background:var(--cool); color:#06201b; }
    .ob-card button.ghost{ background:transparent; color:var(--muted); font-weight:600; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="onboard" id="onboard">
    <div class="ob-card">
      <div class="ob-emoji">🧭</div>
      <h3>NOVARA necesita tu ubicación</h3>
      <p>Para tu posición, el rumbo y calcular rutas <b>desde ti</b>. Sin cuenta, sin rastreo, gratis.</p>
      <button id="obAllow">Permitir ubicación</button>
      <button class="ghost" id="obSkip">Ahora no</button>
    </div>
  </div>

  <div class="search" id="searchBar">
    <div class="box"><span class="logo">NOVARA</span>
      <input id="q" type="text" placeholder="Buscar lugar, dirección…" autocomplete="off" />
      <span id="savedCount"></span></div>
    <div class="results" id="results"></div>
  </div>

  <div class="compass" id="compass" title="Brújula · toca para mirar al norte">
    <div class="rose" id="compassRose"><span class="n">N</span></div>
  </div>

  <div class="navbanner" id="navBanner" style="display:none">
    <div class="ni" id="navInstr" onclick="document.getElementById('navSteps').classList.toggle('show')">—</div>
    <div class="nmeta"><span id="navEta"></span><span class="exit" id="navExit">✕ Salir</span></div>
    <div class="steps" id="navSteps"></div>
  </div>

  <div class="recpill" id="recPill" style="display:none"></div>

  <div class="layerpicker" id="layerPicker">
    <div class="lp-title">Tipo de mapa</div>
    <div class="lp-types">
      <button class="lp on" data-flavor="aventura">Aventura</button>
      <button class="lp" data-flavor="mapa">Mapa</button>
      <button class="lp" data-flavor="satelite">Satélite</button>
      <button class="lp" data-flavor="noche">Noche</button>
    </div>
    <div class="lp-title">Relieve</div>
    <button class="lp overlay on" id="curvasChip">⛰️ Curvas de nivel</button>
    <button class="lp overlay on" id="peaksChip">🗻 Cumbres (nombre + altitud)</button>
    <button class="lp overlay" id="d3Chip">🏔️ Relieve 3D</button>
    <div class="lp-title">Capas</div>
    <button class="lp overlay" id="sendasChip">🥾 Sendas (rutas)</button>
  </div>

  <div class="fabs">
    <div class="fab" id="layersBtn" title="Capas">▦</div>
    <div class="fab" id="locBtn" title="Mi ubicación">◎</div>
    <div class="fab accent" id="trackBtn" title="Grabar track">▶</div>
  </div>

  <div class="sheet" id="sheet">
    <span class="close" id="sheetClose">✕</span><div class="grab"></div>
    <h2 id="sheetTitle">—</h2><div class="sub" id="sheetSub"></div><div class="meta" id="sheetMeta"></div>
    <div class="routebox" id="routeBox" style="display:none"></div>
    <div class="acts">
      <button class="primary" id="actGo">Cómo llegar</button>
      <button id="actSave">Guardar</button>
      <button id="actShare">Compartir</button>
    </div>
  </div>

  <div id="err"></div>

  <script>
    const $=id=>document.getElementById(id);
    let errTimer=null;
    const showErr=m=>{ const e=$("err"); e.textContent=m; e.style.display="block"; clearTimeout(errTimer); errTimer=setTimeout(()=>{ e.style.display="none"; },2000); };
    window.addEventListener("error", ev=>showErr(ev.message||String(ev.error)));

    // ===== Fuentes de mapa: TODO libre (OSM / Sentinel-2 ESA / OpenTopoMap) =====
    const OFM_FONTS="https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf";
    const SAT=["https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2020_3857/default/g/{z}/{y}/{x}.jpg"];
    const SENDAS=["https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png"];
    const rasterStyle=(tiles,attr,maxz)=>({ version:8, glyphs:OFM_FONTS,
      sources:{ r:{ type:"raster", tiles, tileSize:256, attribution:attr, maxzoom:maxz||18 } },
      layers:[{ id:"bg",type:"background",paint:{"background-color":"#0c100e"} },{ id:"r",type:"raster",source:"r" }] });
    // Aventura = OpenFreeMap "liberty" (vector, con relieve, rápido). OpenTopoMap (raster lento/feo) RETIRADO.
    const STYLES={ aventura:"https://tiles.openfreemap.org/styles/liberty", mapa:"https://tiles.openfreemap.org/styles/bright", noche:"https://tiles.openfreemap.org/styles/dark" };
    function buildStyle(f){
      if(f==="satelite") return rasterStyle(SAT,"Sentinel-2 cloudless · EOX (CC-BY) · Copernicus/ESA",18);
      return STYLES[f]||STYLES.aventura;
    }

    const map=new maplibregl.Map({ container:"map", style:buildStyle("aventura"), center:[-3.70,40.42], zoom:5.4, attributionControl:false });
    // Atribución legal obligatoria (OSM/OpenFreeMap) pero colapsada a un (i) discreto, no un texto fijo.
    map.addControl(new maplibregl.AttributionControl({ compact:true }), "bottom-right");
    const collapseAttrib=()=>{ const at=document.querySelector(".maplibregl-ctrl-attrib"); if(at) at.classList.remove("maplibregl-compact-show"); };
    setTimeout(collapseAttrib,400); setTimeout(collapseAttrib,1500);
    map.on("error", e=>showErr("mapa: "+(e.error&&e.error.message)));

    // ===== Relieve desde DEM gratis (terrarium): curvas de nivel + hillshade + 3D =====
    const demSource=new mlcontour.DemSource({ url:"https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png", encoding:"terrarium", maxzoom:13, worker:true });
    demSource.setupMaplibre(maplibregl);
    let showContours=true, is3D=false, showPeaks=true;
    function ensureDem(){ if(!map.getSource("dem")) map.addSource("dem",{ type:"raster-dem", encoding:"terrarium", tiles:[demSource.sharedDemProtocolUrl], maxzoom:13, tileSize:256 }); }
    function firstSymbol(){ const s=map.getStyle().layers.find(l=>l.type==="symbol"); return s?s.id:undefined; }
    function ensureHillshade(){ if(currentFlavor==="satelite") return; ensureDem(); if(!map.getLayer("hillshade")) map.addLayer({ id:"hillshade", type:"hillshade", source:"dem", paint:{ "hillshade-exaggeration":0.35 } }, firstSymbol()); }
    function ensureContours(){ if(!showContours){ ["contour-labels","contour-lines"].forEach(id=>{ if(map.getLayer(id)) map.removeLayer(id); }); return; }
      if(!map.getSource("contours")) map.addSource("contours",{ type:"vector", maxzoom:15, tiles:[ demSource.contourProtocolUrl({ multiplier:1, thresholds:{ 10:[500,2000], 11:[200,1000], 12:[100,500], 13:[100,500], 14:[50,250], 15:[20,100] }, elevationKey:"ele", levelKey:"level", contourLayer:"contours" }) ] });
      const before=firstSymbol();
      if(!map.getLayer("contour-lines")) map.addLayer({ id:"contour-lines", type:"line", source:"contours", "source-layer":"contours", paint:{ "line-color":"rgba(150,110,70,.55)", "line-width":["match",["get","level"],1,1.4,0.6] } }, before);
      if(!map.getLayer("contour-labels")) map.addLayer({ id:"contour-labels", type:"symbol", source:"contours", "source-layer":"contours", filter:[">",["get","level"],0], layout:{ "symbol-placement":"line", "text-field":["concat",["to-string",["get","ele"]]," m"], "text-font":["Noto Sans Regular"], "text-size":10, "text-max-angle":25 }, paint:{ "text-color":"#c79a64", "text-halo-color":"#0c100e", "text-halo-width":1 } }); }
    function applyTerrain(){ if(is3D){ ensureDem(); map.setTerrain({ source:"dem", exaggeration:1.5 }); try{ if(map.setSky) map.setSky({ "sky-color":"#a3c6e6", "horizon-color":"#d6e4f0", "fog-color":"#e6eef5", "fog-ground-blend":0.5 }); }catch(e){} if(map.getPitch()<30) map.easeTo({ pitch:62 }); } else { try{ map.setTerrain(null); }catch(e){} try{ if(map.setSky) map.setSky(null); }catch(e){} map.easeTo({ pitch:0 }); } }
    // Cumbres: nombre + altitud de los picos (datos OSM, gratis) — lo que PeakVisor cobra
    function ensurePeaks(){ if(!showPeaks){ if(map.getLayer("peaks")) map.removeLayer("peaks"); return; }
      if(!map.getSource("peaksrc")) map.addSource("peaksrc",{ type:"vector", url:"https://tiles.openfreemap.org/planet" });
      if(!map.getLayer("peaks")) map.addLayer({ id:"peaks", type:"symbol", source:"peaksrc", "source-layer":"mountain_peak", minzoom:7,
        layout:{ "text-field":["concat","▲ ",["coalesce",["get","name"],""],["case",["has","ele"],["concat","  ",["to-string",["round",["to-number",["get","ele"]]]],"m"],""]],
          "text-font":["Noto Sans Regular"], "text-size":11, "text-anchor":"top", "text-offset":[0,0.2], "text-max-width":9,
          "symbol-sort-key":["case",["has","rank"],["to-number",["get","rank"]],99] },
        paint:{ "text-color":"#f0c074", "text-halo-color":"#0c100e", "text-halo-width":1.5 } }); }

    let userLoc=null, dest=null, routeGeoJSON=null, trackGeoJSON=null, pin=null, userMarker=null, steps=[], heading=null;
    const saved=JSON.parse(localStorage.getItem("novara.saved")||"[]"); const savedMarkers=[];
    let currentFlavor="aventura", sendasOn=false;

    $("layersBtn").onclick=()=>$("layerPicker").classList.toggle("open");
    document.querySelectorAll(".lp[data-flavor]").forEach(b=>b.addEventListener("click",()=>{
      document.querySelectorAll(".lp[data-flavor]").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); currentFlavor=b.dataset.flavor; map.setStyle(buildStyle(currentFlavor)); $("layerPicker").classList.remove("open"); }));
    $("curvasChip").onclick=()=>{ showContours=!showContours; $("curvasChip").classList.toggle("on",showContours); ensureContours(); };
    $("peaksChip").onclick=()=>{ showPeaks=!showPeaks; $("peaksChip").classList.toggle("on",showPeaks); ensurePeaks(); };
    $("d3Chip").onclick=()=>{ is3D=!is3D; $("d3Chip").classList.toggle("on",is3D); applyTerrain(); };
    $("sendasChip").onclick=()=>{ sendasOn=!sendasOn; $("sendasChip").classList.toggle("on",sendasOn);
      if(sendasOn) ensureSendas(); else { if(map.getLayer("sendas-layer")) map.removeLayer("sendas-layer"); if(map.getSource("sendas")) map.removeSource("sendas"); } };

    function ensureRouteLayer(){ if(!routeGeoJSON) return;
      if(!map.getSource("route")) map.addSource("route",{type:"geojson",data:routeGeoJSON}); else map.getSource("route").setData(routeGeoJSON);
      if(!map.getLayer("route-line")) map.addLayer({id:"route-line",type:"line",source:"route",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#34e0c4","line-width":6,"line-opacity":0.92}}); }
    function ensureTrackLayer(){ if(!trackGeoJSON) return;
      if(!map.getSource("track")) map.addSource("track",{type:"geojson",data:trackGeoJSON}); else map.getSource("track").setData(trackGeoJSON);
      if(!map.getLayer("track-line")) map.addLayer({id:"track-line",type:"line",source:"track",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#ff6a2c","line-width":5,"line-opacity":0.95}}); }
    function ensureSendas(){ if(!sendasOn) return;
      if(!map.getSource("sendas")) map.addSource("sendas",{type:"raster",tiles:SENDAS,tileSize:256,attribution:"© Waymarked Trails (CC-BY-SA)"});
      if(!map.getLayer("sendas-layer")) map.addLayer({id:"sendas-layer",type:"raster",source:"sendas",paint:{"raster-opacity":0.85}}); }
    map.on("style.load", ()=>{ ensureHillshade(); ensureContours(); ensurePeaks(); ensureRouteLayer(); ensureTrackLayer(); ensureSendas(); applyTerrain(); updateCompass(); collapseAttrib(); });

    // ===== brújula (orientación del mapa) + reset norte =====
    function updateCompass(){ $("compassRose").style.transform=`rotate(${-map.getBearing()}deg)`; }
    map.on("rotate", updateCompass); map.on("load", updateCompass);
    $("compass").onclick=()=>{ map.easeTo({bearing:0,pitch:0}); requestOrient(); };

    // ===== orientación del dispositivo (flecha "hacia dónde miramos") =====
    function onOrient(e){ let h=null;
      if(e.webkitCompassHeading!=null) h=e.webkitCompassHeading;
      else if(e.absolute && e.alpha!=null) h=360-e.alpha;
      if(h==null) return; heading=h; updateUserHeading(); }
    window.addEventListener("deviceorientationabsolute", onOrient, true);
    window.addEventListener("deviceorientation", onOrient, true);
    function requestOrient(){ try{ if(typeof DeviceOrientationEvent!=="undefined" && DeviceOrientationEvent.requestPermission)
      DeviceOrientationEvent.requestPermission().then(s=>{ if(s==="granted") window.addEventListener("deviceorientation",onOrient,true); }).catch(()=>{}); }catch(e){} }
    function updateUserHeading(){ if(!userMarker||heading==null) return; const h=userMarker.getElement().querySelector(".uh"); if(h) h.style.transform=`translate(-50%,-50%) rotate(${heading}deg)`; }

    function dropPin(lon,lat){ if(pin) pin.remove(); const el=document.createElement("div");
      el.style.cssText="width:18px;height:18px;border-radius:50%;background:#ff6a2c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)";
      pin=new maplibregl.Marker({element:el}).setLngLat([lon,lat]).addTo(map); }
    function userEl(){ const el=document.createElement("div"); el.style.cssText="position:relative;width:24px;height:24px;";
      el.innerHTML=`<div class="uh" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(0deg);width:0;height:0;"><div style="position:absolute;left:-10px;top:-24px;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:20px solid rgba(52,224,196,.6);"></div></div>
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#34e0c4;border:3px solid #fff;box-shadow:0 0 0 5px rgba(52,224,196,.25);"></div>`;
      return el; }
    function starMarker(lon,lat){ const el=document.createElement("div"); el.textContent="★"; el.style.cssText="font-size:22px;color:#ffce78;text-shadow:0 1px 3px #000;cursor:pointer";
      return new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map); }
    saved.forEach(s=>savedMarkers.push(starMarker(s.lon,s.lat)));
    function updateSavedCount(){ $("savedCount").textContent=saved.length?("★ "+saved.length):""; } updateSavedCount();

    const fmtDist=m=> m<1000? Math.round(m)+" m" : (m/1000).toFixed(m<10000?1:0)+" km";
    const fmtTime=s=>{ const m=Math.round(s/60); return m<60? m+" min" : Math.floor(m/60)+" h "+(m%60)+" min"; };
    function haversine(a,b){ const R=6371000,toR=x=>x*Math.PI/180; const dLat=toR(b.lat-a.lat),dLon=toR(b.lon-a.lon);
      const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(s)); }
    function getLoc(){ return new Promise((res,rej)=>{ if(!navigator.geolocation) return rej("Este navegador no da ubicación");
      navigator.geolocation.getCurrentPosition(p=>{ userLoc={lon:p.coords.longitude,lat:p.coords.latitude}; res(userLoc); },
        e=>rej(e.code===1?"Permiso de ubicación denegado — actívalo (icono del candado) para GPS, rumbo y rutas desde ti":"No pude obtener tu ubicación (señal GPS)"),
        {enableHighAccuracy:true,timeout:8000}); }); }

    const sheet=$("sheet");
    function showPlace(p){ dest=p; $("sheetTitle").textContent=p.name; $("sheetSub").textContent=p.sub||"";
      const bits=[]; if(p.cat) bits.push(p.cat); if(userLoc) bits.push("a "+fmtDist(haversine(userLoc,p))+" de ti");
      bits.push(p.lat.toFixed(5)+", "+p.lon.toFixed(5)); $("sheetMeta").textContent=bits.join(" · ");
      $("routeBox").style.display="none"; sheet.classList.add("open"); }
    $("sheetClose").onclick=()=>sheet.classList.remove("open");

    const MODEI={coche:"🚗",pie:"🚶",bici:"🚴"};
    async function routeTo(p, mode="coche"){
      let origin=userLoc; if(!origin){ try{ origin=await getLoc(); }catch(e){} } if(!origin){ origin={lon:map.getCenter().lng,lat:map.getCenter().lat}; }
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML="Calculando ruta…";
      try{ const url=`https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${p.lon},${p.lat}?overview=full&geometries=geojson&steps=true`;
        const j=await (await fetch(url)).json(); if(!j.routes||!j.routes[0]){ rb.innerHTML="Sin ruta disponible."; return; }
        const r=j.routes[0]; routeGeoJSON={type:"Feature",geometry:r.geometry}; ensureRouteLayer(); steps=(r.legs[0]&&r.legs[0].steps)||[];
        renderRouteBox(mode,r.distance,r.duration); elevationProfile(r.geometry.coordinates,$("elevBox"));
        const cs=r.geometry.coordinates,b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c)); map.fitBounds(b,{padding:{top:130,bottom:320,left:40,right:40}});
      }catch(e){ rb.innerHTML="Error de ruta"; showErr("ruta: "+e); } }
    function renderRouteBox(mode,distM,timeS){ const rb=$("routeBox");
      rb.innerHTML=`<div class="modes">${["coche","pie","bici"].map(m=>`<span class="mode ${m===mode?'on':''}" data-mode="${m}">${MODEI[m]}</span>`).join("")}<b style="margin-left:auto">${fmtDist(distM)} · ${fmtTime(timeS)}</b></div>
        <div id="modeNote" class="muted" style="margin-top:6px;font-size:12px;${mode==='coche'?'display:none':''}">Pie/bici: router propio (R5b). Mostrando coche.</div>
        <div id="elevBox"></div><button class="startnav" id="startNav">Iniciar navegación</button>`;
      rb.querySelectorAll(".mode").forEach(el=>el.onclick=()=>{ if(dest) routeTo(dest,el.dataset.mode); }); $("startNav").onclick=startNav; }
    function instr(step){ const m=step.maneuver,road=step.name||""; const d={left:"a la izquierda",right:"a la derecha","slight left":"ligeramente a la izda","slight right":"ligeramente a la dcha","sharp left":"cerrada a la izda","sharp right":"cerrada a la dcha",straight:"recto",uturn:"en U"}[m.modifier]||"";
      switch(m.type){ case "depart":return "Sal"+(road?" por "+road:""); case "turn":return "Gira "+d+(road?" hacia "+road:""); case "new name":return "Continúa"+(road?" por "+road:""); case "continue":return "Continúa "+d+(road?" por "+road:""); case "merge":return "Incorpórate"+(road?" a "+road:""); case "roundabout": case "rotary":return "En la rotonda toma la salida"+(m.exit?" "+m.exit:"")+(road?" hacia "+road:""); case "end of road":return "Al final gira "+d+(road?" hacia "+road:""); case "fork":return "Mantente "+d+(road?" hacia "+road:""); case "arrive":return "Has llegado"+(road?" a "+road:""); default:return ((m.type+" "+d).trim()||"Sigue")+(road?" por "+road:""); } }
    function startNav(){ if(!steps.length) return; sheet.classList.remove("open"); $("navInstr").textContent=instr(steps[0]); $("navEta").textContent=steps.length+" maniobras";
      $("navSteps").innerHTML=steps.map(s=>{ const dm=s.distance,dt=dm<1000?Math.round(dm)+" m":(dm/1000).toFixed(1)+" km"; return `<div class="step">${instr(s)} <span class="muted">${dt}</span></div>`; }).join(""); $("navBanner").style.display="block"; }
    $("navExit").onclick=()=>{ $("navBanner").style.display="none"; };
    $("actGo").onclick=()=>{ if(dest) routeTo(dest,"coche"); };

    // perfil de elevación (Open-Meteo)
    function sampleCoords(c,n){ if(c.length<=n) return c; const o=[],st=(c.length-1)/(n-1); for(let i=0;i<n;i++) o.push(c[Math.round(i*st)]); return o; }
    async function elevationProfile(coords,mount){ if(!mount||!coords||coords.length<2) return;
      try{ const pts=sampleCoords(coords,48),lat=pts.map(c=>c[1].toFixed(5)).join(","),lon=pts.map(c=>c[0].toFixed(5)).join(",");
        const j=await (await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`)).json(); const el=j.elevation; if(!el||!el.length) return;
        let asc=0,desc=0; for(let i=1;i<el.length;i++){ const dd=el[i]-el[i-1]; if(dd>0)asc+=dd; else desc+=-dd; }
        const mn=Math.min(...el),mx=Math.max(...el),n=el.length,W=260,H=54,X=i=>(i/(n-1))*W,Y=v=>H-4-((v-mn)/((mx-mn)||1))*(H-10);
        let d="M "+X(0).toFixed(1)+" "+Y(el[0]).toFixed(1); for(let i=1;i<n;i++) d+=" L "+X(i).toFixed(1)+" "+Y(el[i]).toFixed(1);
        mount.innerHTML=`<div style="margin-top:10px"><svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none"><path d="${d} L ${W} ${H} L 0 ${H} Z" fill="rgba(52,224,196,.18)"/><path d="${d}" fill="none" stroke="#34e0c4" stroke-width="2"/></svg><div class="muted" style="font-size:12px;margin-top:4px">↗ +${Math.round(asc)} m · ↘ -${Math.round(desc)} m · máx ${Math.round(mx)} m</div></div>`;
      }catch(e){} }

    $("actSave").onclick=()=>{ if(!dest) return; saved.push({name:dest.name,lon:dest.lon,lat:dest.lat}); localStorage.setItem("novara.saved",JSON.stringify(saved)); savedMarkers.push(starMarker(dest.lon,dest.lat)); updateSavedCount(); $("actSave").textContent="✓ Guardado"; setTimeout(()=>$("actSave").textContent="Guardar",1500); };
    $("actShare").onclick=()=>{ if(!dest) return; const t=`${dest.name} — https://www.openstreetmap.org/?mlat=${dest.lat}&mlon=${dest.lon}#map=16/${dest.lat}/${dest.lon}`; if(navigator.clipboard) navigator.clipboard.writeText(t).then(()=>{ $("actShare").textContent="✓ Copiado"; setTimeout(()=>$("actShare").textContent="Compartir",1500); }).catch(()=>{}); };

    const q=$("q"),results=$("results"); let timer=null;
    q.addEventListener("input",()=>{ clearTimeout(timer); const v=q.value.trim(); if(v.length<3){ results.classList.remove("show"); return; } timer=setTimeout(()=>doSearch(v),280); });
    async function doSearch(v){ try{ const j=await (await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(v)}&limit=6&lang=default`)).json(); results.innerHTML="";
        (j.features||[]).forEach(f=>{ const p=f.properties,[lon,lat]=f.geometry.coordinates; const name=p.name||p.street||"(sin nombre)"; const sub=[p.city,p.state,p.country].filter(Boolean).join(", "); const cat=p.osm_value||p.type||"";
          const row=document.createElement("div"); row.className="row"; row.innerHTML=`<div class="t">${name}</div><div class="s">${sub}</div>`;
          row.onclick=()=>{ results.classList.remove("show"); q.value=name; map.flyTo({center:[lon,lat],zoom:14}); dropPin(lon,lat); showPlace({name,sub,lon,lat,cat}); }; results.appendChild(row); });
        results.classList.add("show"); }catch(e){ showErr("búsqueda: "+e); } }

    $("locBtn").onclick=async()=>{ requestOrient(); try{ const l=await getLoc(); if(userMarker) userMarker.remove(); userMarker=new maplibregl.Marker({element:userEl()}).setLngLat([l.lon,l.lat]).addTo(map); updateUserHeading(); map.flyTo({center:[l.lon,l.lat],zoom:15}); }catch(e){ showErr("ubicación: "+e); } };

    map.on("contextmenu", e=>{ const {lng,lat}=e.lngLat; dropPin(lng,lat); showPlace({name:"Punto en el mapa",sub:"",lon:lng,lat,cat:""}); });

    // R6 grabar track + TrackBack
    let recording=false,watchId=null,track=[],lastTrack=null;
    function trackDist(t){ let d=0; for(let i=1;i<t.length;i++) d+=haversine({lon:t[i-1][0],lat:t[i-1][1]},{lon:t[i][0],lat:t[i][1]}); return d; }
    function toggleRecord(){ if(recording){ stopRecord(); return; } if(!navigator.geolocation){ showErr("sin GPS"); return; }
      requestOrient(); recording=true; track=[]; $("trackBtn").textContent="■"; const rp=$("recPill"); rp.style.display="block"; rp.textContent="● Grabando · 0 m";
      watchId=navigator.geolocation.watchPosition(pos=>{ track.push([pos.coords.longitude,pos.coords.latitude]); trackGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates:track.length>1?track:[track[0],track[0]]}}; ensureTrackLayer(); rp.textContent="● Grabando · "+fmtDist(trackDist(track))+" · "+track.length+" pts"; if(track.length===1) map.flyTo({center:track[0],zoom:16}); }, e=>showErr("GPS: "+e.message), {enableHighAccuracy:true,maximumAge:1000}); }
    function stopRecord(){ recording=false; if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; } $("trackBtn").textContent="▶"; $("recPill").style.display="none";
      if(track.length<2){ showPlace({name:"Track sin movimiento",sub:"Muévete para grabar un recorrido.",lon:map.getCenter().lng,lat:map.getCenter().lat}); return; }
      lastTrack=track.slice(); const tr=JSON.parse(localStorage.getItem("novara.tracks")||"[]"); tr.push({when:Date.now(),pts:lastTrack}); localStorage.setItem("novara.tracks",JSON.stringify(tr));
      $("sheetTitle").textContent="✓ Track guardado"; $("sheetSub").textContent=fmtDist(trackDist(lastTrack))+" · "+lastTrack.length+" puntos"; $("sheetMeta").textContent="";
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML=`<div id="elevBox"></div><button class="startnav" id="tbBtn">↩ TrackBack — volver por tu rastro</button>`; elevationProfile(lastTrack,$("elevBox")); $("tbBtn").onclick=trackBack; sheet.classList.add("open"); }
    function trackBack(){ if(!lastTrack||lastTrack.length<2) return; routeGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates:lastTrack.slice().reverse()}}; ensureRouteLayer();
      const cs=routeGeoJSON.geometry.coordinates,b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c)); map.fitBounds(b,{padding:70}); $("sheetTitle").textContent="↩ TrackBack activo"; $("sheetSub").textContent="Sigue la línea para volver por donde viniste"; }
    $("trackBtn").onclick=toggleRecord;

    // onboarding fricción-cero (una vez): explica y activa el GPS de un toque
    if(!localStorage.getItem("novara.onboarded")) setTimeout(()=>$("onboard").classList.add("show"),900);
    $("obAllow").onclick=()=>{ localStorage.setItem("novara.onboarded","1"); $("onboard").classList.remove("show"); requestOrient(); $("locBtn").click(); };
    $("obSkip").onclick=()=>{ localStorage.setItem("novara.onboarded","1"); $("onboard").classList.remove("show"); };
  </script>
</body>
</html>
