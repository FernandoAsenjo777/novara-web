<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NOVARA — prototype</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    :root{ --bg:#0c100e; --panel:rgba(12,16,14,.72); --ink:#f2f5f3; --muted:#93a39b;
           --hair:rgba(255,255,255,.10); --warm:#ff6a2c; --cool:#34e0c4; }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; background:var(--bg);
      font-family:-apple-system,system-ui,"Segoe UI",sans-serif; color:var(--ink); }
    #map{ position:absolute; inset:0; }

    .search{ position:absolute; top:14px; left:14px; right:14px; z-index:6; }
    .search .box{ display:flex; align-items:center; gap:10px; padding:11px 14px;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair);
      border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.35); }
    .search .logo{ font-weight:800; letter-spacing:.16em; font-size:13px; }
    .search input{ flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-size:15px; }
    .search input::placeholder{ color:var(--muted); }
    #savedCount{ color:var(--cool); font-size:12px; font-weight:700; }
    .results{ margin-top:8px; background:var(--panel); backdrop-filter:blur(12px);
      border:1px solid var(--hair); border-radius:14px; overflow:hidden; display:none; }
    .results.show{ display:block; }
    .results .row{ padding:11px 14px; border-bottom:1px solid var(--hair); cursor:pointer; }
    .results .row:last-child{ border-bottom:0; }
    .results .t{ font-size:14px; } .results .s{ font-size:12px; color:var(--muted); }

    .navbanner{ position:absolute; top:14px; left:14px; right:14px; z-index:8;
      background:rgba(12,16,14,.94); backdrop-filter:blur(12px); border:1px solid var(--hair);
      border-radius:16px; padding:14px 16px; box-shadow:0 6px 22px rgba(0,0,0,.55); }
    .navbanner .ni{ font-size:17px; font-weight:700; cursor:pointer; }
    .navbanner .nmeta{ display:flex; justify-content:space-between; color:var(--muted); font-size:13px; margin-top:6px; }
    .navbanner .nmeta .exit{ color:#ff8a8a; cursor:pointer; font-weight:700; }
    .navbanner .steps{ display:none; margin-top:10px; max-height:240px; overflow:auto; border-top:1px solid var(--hair); padding-top:8px; }
    .navbanner .steps.show{ display:block; }
    .navbanner .step{ padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    .navbanner .step .muted{ color:var(--muted); }

    .recpill{ position:absolute; top:78px; left:50%; transform:translateX(-50%); z-index:8;
      background:rgba(255,106,44,.94); color:#1a0d06; font-weight:800; font-size:13px;
      padding:9px 16px; border-radius:20px; box-shadow:0 4px 16px rgba(0,0,0,.4); }

    .layers{ position:absolute; left:14px; bottom:120px; z-index:5; display:flex; gap:8px; flex-wrap:wrap; max-width:62%; }
    .chip{ padding:8px 13px; border-radius:11px; cursor:pointer; font-size:13px; font-weight:600;
      background:var(--panel); backdrop-filter:blur(12px); border:1px solid var(--hair); color:var(--muted); }
    .chip.on{ color:var(--cool); border-color:rgba(52,224,196,.5); background:rgba(52,224,196,.14); }

    .fabs{ position:absolute; right:14px; bottom:120px; z-index:5; display:flex; flex-direction:column; gap:12px; }
    .fab{ width:52px; height:52px; border-radius:50%; border:1px solid var(--hair);
      background:rgba(18,23,20,.9); backdrop-filter:blur(12px); color:var(--ink);
      font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.4); }
    .fab.accent{ background:var(--warm); color:#1a0d06; border-color:transparent; }

    .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:7; transform:translateY(100%);
      transition:transform .25s ease; background:var(--bg); border-top-left-radius:20px; border-top-right-radius:20px;
      border-top:1px solid var(--hair); box-shadow:0 -8px 30px rgba(0,0,0,.5); padding:8px 18px 22px; }
    .sheet.open{ transform:translateY(0); }
    .sheet .grab{ width:42px; height:5px; border-radius:3px; background:#3a463f; margin:6px auto 12px; }
    .sheet h2{ margin:0; font-size:19px; }
    .sheet .sub{ color:var(--muted); font-size:13px; margin-top:3px; }
    .sheet .meta{ color:var(--muted); font-size:12px; margin-top:8px; }
    .sheet .routebox{ margin-top:14px; padding:12px 14px; border-radius:12px; border:1px solid rgba(52,224,196,.4);
      background:rgba(52,224,196,.10); font-size:14px; }
    .routebox .muted{ color:var(--muted); }
    .routebox .modes{ display:flex; align-items:center; gap:8px; }
    .routebox .mode{ padding:6px 10px; border-radius:9px; border:1px solid var(--hair); cursor:pointer; font-size:16px; }
    .routebox .mode.on{ border-color:rgba(52,224,196,.6); background:rgba(52,224,196,.16); }
    .routebox .startnav{ margin-top:12px; width:100%; padding:12px; border-radius:12px; border:0;
      background:var(--cool); color:#06201b; font-weight:800; font-size:15px; cursor:pointer; }
    .sheet .acts{ display:flex; gap:10px; margin-top:16px; }
    .sheet .acts button{ flex:1; padding:13px 8px; border-radius:14px; border:1px solid var(--hair);
      background:rgba(255,255,255,.06); color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }
    .sheet .acts button.primary{ background:var(--warm); color:#1a0d06; border-color:transparent; }
    .sheet .close{ position:absolute; top:14px; right:16px; color:var(--muted); cursor:pointer; font-size:18px; }

    #err{ position:absolute; left:0; right:0; bottom:0; z-index:9; color:#ff8a8a;
          font:12px/1.4 monospace; padding:8px; background:rgba(0,0,0,.75); display:none; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="search" id="searchBar">
    <div class="box">
      <span class="logo">NOVARA</span>
      <input id="q" type="text" placeholder="Buscar lugar, dirección…" autocomplete="off" />
      <span id="savedCount"></span>
    </div>
    <div class="results" id="results"></div>
  </div>

  <!-- R5: navegación turn-by-turn -->
  <div class="navbanner" id="navBanner" style="display:none">
    <div class="ni" id="navInstr" onclick="document.getElementById('navSteps').classList.toggle('show')">—</div>
    <div class="nmeta"><span id="navEta"></span><span class="exit" id="navExit">✕ Salir</span></div>
    <div class="steps" id="navSteps"></div>
  </div>

  <!-- R6: grabando -->
  <div class="recpill" id="recPill" style="display:none"></div>

  <div class="layers">
    <div class="chip on" data-flavor="outdoor">Topo</div>
    <div class="chip" data-flavor="light">Mapa</div>
    <div class="chip" data-flavor="dark">Noche</div>
    <div class="chip" data-flavor="satellite">Satélite</div>
  </div>

  <div class="fabs">
    <div class="fab" id="locBtn" title="Mi ubicación">◎</div>
    <div class="fab accent" id="trackBtn" title="Grabar track">▶</div>
  </div>

  <div class="sheet" id="sheet">
    <span class="close" id="sheetClose">✕</span>
    <div class="grab"></div>
    <h2 id="sheetTitle">—</h2>
    <div class="sub" id="sheetSub"></div>
    <div class="meta" id="sheetMeta"></div>
    <div class="routebox" id="routeBox" style="display:none"></div>
    <div class="acts">
      <button class="primary" id="actGo">Cómo llegar</button>
      <button id="actSave">Guardar</button>
      <button id="actShare">Compartir</button>
    </div>
  </div>

  <div id="err"></div>

  <script>
    const $=id=>document.getElementById(id);
    const showErr=m=>{ const e=$("err"); e.style.display="block"; e.textContent+=m+"\n"; };
    window.addEventListener("error", ev=>showErr("ERR: "+(ev.message||ev.error)));

    const STYLES={ outdoor:"https://tiles.openfreemap.org/styles/liberty",
                   light:"https://tiles.openfreemap.org/styles/bright",
                   dark:"https://tiles.openfreemap.org/styles/dark" };
    const SAT="https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
    const satelliteStyle=()=>({ version:8, glyphs:"https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf",
      sources:{ sat:{type:"raster",tiles:[SAT],tileSize:256,attribution:"© Esri"},
                omt:{type:"vector",url:"https://tiles.openfreemap.org/planet"} },
      layers:[ {id:"sat",type:"raster",source:"sat"},
        {id:"places",type:"symbol",source:"omt","source-layer":"place",
          filter:["in",["get","class"],["literal",["city","town","village"]]],
          layout:{"text-field":["coalesce",["get","name:es"],["get","name"]],"text-font":["Noto Sans Regular"],"text-size":13},
          paint:{"text-color":"#fff","text-halo-color":"#000","text-halo-width":1.4}} ] });
    const buildStyle=f=> f==="satellite"? satelliteStyle() : STYLES[f];

    const map=new maplibregl.Map({ container:"map", style:buildStyle("outdoor"), center:[-3.70,40.42], zoom:5.4, attributionControl:{compact:true} });
    map.on("error", e=>showErr("map: "+(e.error&&e.error.message)));

    let userLoc=null, dest=null, routeGeoJSON=null, pin=null, userMarker=null, steps=[];
    const saved=JSON.parse(localStorage.getItem("novara.saved")||"[]");
    const savedMarkers=[];

    document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
      document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
      ch.classList.add("on"); map.setStyle(buildStyle(ch.dataset.flavor)); }));

    function ensureRouteLayer(){ if(!routeGeoJSON) return;
      if(!map.getSource("route")) map.addSource("route",{type:"geojson",data:routeGeoJSON});
      else map.getSource("route").setData(routeGeoJSON);
      if(!map.getLayer("route-line")) map.addLayer({ id:"route-line",type:"line",source:"route",
        layout:{"line-cap":"round","line-join":"round"}, paint:{"line-color":"#34e0c4","line-width":6,"line-opacity":0.92} }); }
    function ensureTrackLayer(){ if(!trackGeoJSON) return;
      if(!map.getSource("track")) map.addSource("track",{type:"geojson",data:trackGeoJSON});
      else map.getSource("track").setData(trackGeoJSON);
      if(!map.getLayer("track-line")) map.addLayer({ id:"track-line",type:"line",source:"track",
        layout:{"line-cap":"round","line-join":"round"}, paint:{"line-color":"#ff6a2c","line-width":5,"line-opacity":0.95} }); }
    map.on("style.load", ()=>{ ensureRouteLayer(); ensureTrackLayer(); });

    function dropPin(lon,lat){ if(pin) pin.remove();
      const el=document.createElement("div");
      el.style.cssText="width:18px;height:18px;border-radius:50%;background:#ff6a2c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)";
      pin=new maplibregl.Marker({element:el}).setLngLat([lon,lat]).addTo(map); }
    function starMarker(lon,lat){ const el=document.createElement("div");
      el.textContent="★"; el.style.cssText="font-size:22px;color:#ffce78;text-shadow:0 1px 3px #000;cursor:pointer";
      return new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map); }
    saved.forEach(s=>savedMarkers.push(starMarker(s.lon,s.lat)));
    function updateSavedCount(){ $("savedCount").textContent=saved.length?("★ "+saved.length):""; }
    updateSavedCount();

    const fmtDist=m=> m<1000? Math.round(m)+" m" : (m/1000).toFixed(m<10000?1:0)+" km";
    const fmtTime=s=>{ const m=Math.round(s/60); return m<60? m+" min" : Math.floor(m/60)+" h "+(m%60)+" min"; };
    function haversine(a,b){ const R=6371000, toR=x=>x*Math.PI/180;
      const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
      const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
      return 2*R*Math.asin(Math.sqrt(s)); }
    function getLoc(){ return new Promise((res,rej)=>{ if(!navigator.geolocation) return rej("no geo");
      navigator.geolocation.getCurrentPosition(p=>{ userLoc={lon:p.coords.longitude,lat:p.coords.latitude}; res(userLoc); }, e=>rej(e.message), {enableHighAccuracy:true,timeout:8000}); }); }

    const sheet=$("sheet");
    function showPlace(p){ dest=p;
      $("sheetTitle").textContent=p.name; $("sheetSub").textContent=p.sub||"";
      const bits=[]; if(p.cat) bits.push(p.cat);
      if(userLoc) bits.push("a "+fmtDist(haversine(userLoc,p))+" de ti");
      bits.push(p.lat.toFixed(5)+", "+p.lon.toFixed(5));
      $("sheetMeta").textContent=bits.join(" · "); $("routeBox").style.display="none"; sheet.classList.add("open"); }
    $("sheetClose").onclick=()=>sheet.classList.remove("open");

    // ===== R4/R5: ruta (OSRM) + turn-by-turn =====
    const MODEI={coche:"🚗",pie:"🚶",bici:"🚴"};
    async function routeTo(p, mode="coche"){
      let origin=userLoc; if(!origin){ try{ origin=await getLoc(); }catch(e){} }
      if(!origin){ origin={lon:map.getCenter().lng, lat:map.getCenter().lat}; }
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML="Calculando ruta…";
      try{
        const url=`https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${p.lon},${p.lat}?overview=full&geometries=geojson&steps=true`;
        const j=await (await fetch(url)).json();
        if(!j.routes||!j.routes[0]){ rb.innerHTML="Sin ruta disponible para este punto."; return; }
        const r=j.routes[0]; routeGeoJSON={type:"Feature",geometry:r.geometry}; ensureRouteLayer();
        steps=(r.legs[0]&&r.legs[0].steps)||[];
        renderRouteBox(mode, r.distance, r.duration);
        elevationProfile(r.geometry.coordinates, $("elevBox"));
        const cs=r.geometry.coordinates; const b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c));
        map.fitBounds(b,{ padding:{top:130,bottom:320,left:40,right:40} });
      }catch(e){ rb.innerHTML="Error de ruta"; showErr("route: "+e); }
    }
    function renderRouteBox(mode, distM, timeS){ const rb=$("routeBox");
      rb.innerHTML=`<div class="modes">
        ${["coche","pie","bici"].map(m=>`<span class="mode ${m===mode?'on':''}" data-mode="${m}">${MODEI[m]}</span>`).join("")}
        <b style="margin-left:auto">${fmtDist(distM)} · ${fmtTime(timeS)}</b></div>
        <div id="modeNote" class="muted" style="margin-top:6px;font-size:12px;${mode==='coche'?'display:none':''}">Pie/bici: router propio en R5b. Mostrando coche.</div>
        <div id="elevBox"></div>
        <button class="startnav" id="startNav">Iniciar navegación</button>`;
      rb.querySelectorAll(".mode").forEach(el=>el.onclick=()=>{ if(dest) routeTo(dest, el.dataset.mode); });
      $("startNav").onclick=startNav; }

    // ===== R7: perfil de elevación (Garmin) — Open-Meteo =====
    function sampleCoords(coords,n){ if(coords.length<=n) return coords; const out=[],step=(coords.length-1)/(n-1);
      for(let i=0;i<n;i++) out.push(coords[Math.round(i*step)]); return out; }
    async function elevationProfile(coords, mount){
      if(!mount||!coords||coords.length<2) return;
      try{
        const pts=sampleCoords(coords,48);
        const lat=pts.map(c=>c[1].toFixed(5)).join(","), lon=pts.map(c=>c[0].toFixed(5)).join(",");
        const j=await (await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`)).json();
        const el=j.elevation; if(!el||!el.length) return;
        let asc=0,desc=0; for(let i=1;i<el.length;i++){ const d=el[i]-el[i-1]; if(d>0) asc+=d; else desc+=-d; }
        const min=Math.min(...el),max=Math.max(...el),n=el.length,W=260,H=54;
        const X=i=>(i/(n-1))*W, Y=v=>H-4-((v-min)/((max-min)||1))*(H-10);
        let d="M "+X(0).toFixed(1)+" "+Y(el[0]).toFixed(1); for(let i=1;i<n;i++) d+=" L "+X(i).toFixed(1)+" "+Y(el[i]).toFixed(1);
        mount.innerHTML=`<div style="margin-top:10px">
          <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
            <path d="${d} L ${W} ${H} L 0 ${H} Z" fill="rgba(52,224,196,.18)"/>
            <path d="${d}" fill="none" stroke="#34e0c4" stroke-width="2"/></svg>
          <div class="muted" style="font-size:12px;margin-top:4px">↗ +${Math.round(asc)} m · ↘ -${Math.round(desc)} m · máx ${Math.round(max)} m</div></div>`;
      }catch(e){ /* perfil opcional, silencioso */ }
    }
    function instr(step){ const m=step.maneuver, road=step.name||"";
      const d={left:"a la izquierda",right:"a la derecha","slight left":"ligeramente a la izda","slight right":"ligeramente a la dcha","sharp left":"cerrada a la izda","sharp right":"cerrada a la dcha",straight:"recto",uturn:"en U"}[m.modifier]||"";
      switch(m.type){
        case "depart": return "Sal"+(road?" por "+road:"");
        case "turn": return "Gira "+d+(road?" hacia "+road:"");
        case "new name": return "Continúa"+(road?" por "+road:"");
        case "continue": return "Continúa "+d+(road?" por "+road:"");
        case "merge": return "Incorpórate"+(road?" a "+road:"");
        case "on ramp": return "Toma el acceso"+(road?" a "+road:"");
        case "off ramp": return "Toma la salida"+(road?" hacia "+road:"");
        case "fork": return "Mantente "+d+(road?" hacia "+road:"");
        case "end of road": return "Al final gira "+d+(road?" hacia "+road:"");
        case "roundabout": case "rotary": return "En la rotonda toma la salida"+(m.exit?" "+m.exit:"")+(road?" hacia "+road:"");
        case "arrive": return "Has llegado"+(road?" a "+road:"");
        default: return ((m.type+" "+d).trim()||"Sigue")+(road?" por "+road:""); } }
    function startNav(){ if(!steps.length) return; sheet.classList.remove("open");
      $("navInstr").textContent=instr(steps[0]); $("navEta").textContent=steps.length+" maniobras";
      $("navSteps").innerHTML=steps.map(s=>{ const dm=s.distance, dt=dm<1000?Math.round(dm)+" m":(dm/1000).toFixed(1)+" km";
        return `<div class="step">${instr(s)} <span class="muted">${dt}</span></div>`; }).join("");
      $("navBanner").style.display="block"; }
    $("navExit").onclick=()=>{ $("navBanner").style.display="none"; };
    $("actGo").onclick=()=>{ if(dest) routeTo(dest,"coche"); };

    // ===== R2: guardar / compartir =====
    $("actSave").onclick=()=>{ if(!dest) return;
      saved.push({name:dest.name,lon:dest.lon,lat:dest.lat}); localStorage.setItem("novara.saved",JSON.stringify(saved));
      savedMarkers.push(starMarker(dest.lon,dest.lat)); updateSavedCount();
      $("actSave").textContent="✓ Guardado"; setTimeout(()=>$("actSave").textContent="Guardar",1500); };
    $("actShare").onclick=()=>{ if(!dest) return;
      const t=`${dest.name} — https://www.openstreetmap.org/?mlat=${dest.lat}&mlon=${dest.lon}#map=16/${dest.lat}/${dest.lon}`;
      if(navigator.clipboard) navigator.clipboard.writeText(t).then(()=>{ $("actShare").textContent="✓ Copiado"; setTimeout(()=>$("actShare").textContent="Compartir",1500); }).catch(()=>{}); };

    // ===== R1: búsqueda (Photon) =====
    const q=$("q"), results=$("results"); let timer=null;
    q.addEventListener("input",()=>{ clearTimeout(timer); const v=q.value.trim();
      if(v.length<3){ results.classList.remove("show"); return; } timer=setTimeout(()=>doSearch(v),280); });
    async function doSearch(v){ try{
        const j=await (await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(v)}&limit=6&lang=default`)).json();
        results.innerHTML="";
        (j.features||[]).forEach(f=>{ const p=f.properties, [lon,lat]=f.geometry.coordinates;
          const name=p.name||p.street||"(sin nombre)";
          const sub=[p.city,p.state,p.country].filter(Boolean).join(", "); const cat=p.osm_value||p.type||"";
          const row=document.createElement("div"); row.className="row";
          row.innerHTML=`<div class="t">${name}</div><div class="s">${sub}</div>`;
          row.onclick=()=>{ results.classList.remove("show"); q.value=name;
            map.flyTo({center:[lon,lat],zoom:14}); dropPin(lon,lat); showPlace({name,sub,lon,lat,cat}); };
          results.appendChild(row); });
        results.classList.add("show");
      }catch(e){ showErr("search: "+e); } }

    $("locBtn").onclick=async()=>{ try{ const l=await getLoc();
      if(userMarker) userMarker.remove(); const el=document.createElement("div");
      el.style.cssText="width:16px;height:16px;border-radius:50%;background:#34e0c4;border:3px solid #fff;box-shadow:0 0 0 6px rgba(52,224,196,.25)";
      userMarker=new maplibregl.Marker({element:el}).setLngLat([l.lon,l.lat]).addTo(map);
      map.flyTo({center:[l.lon,l.lat],zoom:15}); }catch(e){ showErr("ubicación: "+e); } };

    map.on("contextmenu", e=>{ const {lng,lat}=e.lngLat; dropPin(lng,lat);
      showPlace({name:"Punto en el mapa", sub:"", lon:lng, lat, cat:""}); });

    // ===== R6: grabar track + TrackBack (Garmin) =====
    let recording=false, watchId=null, track=[], trackGeoJSON=null, lastTrack=null;
    function trackDist(t){ let d=0; for(let i=1;i<t.length;i++) d+=haversine({lon:t[i-1][0],lat:t[i-1][1]},{lon:t[i][0],lat:t[i][1]}); return d; }
    function toggleRecord(){
      if(recording){ stopRecord(); return; }
      if(!navigator.geolocation){ showErr("sin GPS"); return; }
      recording=true; track=[]; $("trackBtn").textContent="■"; const rp=$("recPill"); rp.style.display="block"; rp.textContent="● Grabando · 0 m";
      watchId=navigator.geolocation.watchPosition(pos=>{
        track.push([pos.coords.longitude,pos.coords.latitude]);
        trackGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates: track.length>1?track:[track[0],track[0]]}}; ensureTrackLayer();
        rp.textContent="● Grabando · "+fmtDist(trackDist(track))+" · "+track.length+" pts";
        if(track.length===1) map.flyTo({center:track[0],zoom:16});
      }, e=>showErr("GPS: "+e.message), {enableHighAccuracy:true,maximumAge:1000}); }
    function stopRecord(){
      recording=false; if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
      $("trackBtn").textContent="▶"; $("recPill").style.display="none";
      if(track.length<2){ showPlace({name:"Track sin movimiento", sub:"Muévete para grabar un recorrido.", lon:map.getCenter().lng, lat:map.getCenter().lat}); return; }
      lastTrack=track.slice();
      const tracks=JSON.parse(localStorage.getItem("novara.tracks")||"[]"); tracks.push({when:Date.now(),pts:lastTrack}); localStorage.setItem("novara.tracks",JSON.stringify(tracks));
      $("sheetTitle").textContent="✓ Track guardado"; $("sheetSub").textContent=fmtDist(trackDist(lastTrack))+" · "+lastTrack.length+" puntos"; $("sheetMeta").textContent="";
      const rb=$("routeBox"); rb.style.display="block"; rb.innerHTML=`<div id="elevBox"></div><button class="startnav" id="tbBtn">↩ TrackBack — volver por tu rastro</button>`;
      elevationProfile(lastTrack, $("elevBox"));
      $("tbBtn").onclick=trackBack; sheet.classList.add("open"); }
    function trackBack(){ if(!lastTrack||lastTrack.length<2) return;
      routeGeoJSON={type:"Feature",geometry:{type:"LineString",coordinates:lastTrack.slice().reverse()}}; ensureRouteLayer();
      const cs=routeGeoJSON.geometry.coordinates; const b=new maplibregl.LngLatBounds(cs[0],cs[0]); cs.forEach(c=>b.extend(c)); map.fitBounds(b,{padding:70});
      $("sheetTitle").textContent="↩ TrackBack activo"; $("sheetSub").textContent="Sigue la línea para volver por donde viniste"; }
    $("trackBtn").onclick=toggleRecord;
  </script>
</body>
